#!/usr/sbin/nft -f

flush ruleset

table inet campus_nac {
    set campus_students {
        type ipv4_addr
        flags timeout
    }

    set campus_admins {
        type ipv4_addr
        flags timeout
    }

    set campus_shared_services {
        type ipv4_addr
        flags interval
        elements = { 192.168.50.20, 192.168.50.30, 192.168.50.40, 192.168.50.70 }
    }

    set campus_student_ssh_targets {
        type ipv4_addr
        flags interval
        elements = { 192.168.10.10, 192.168.70.10 }
    }

    set campus_admin_ssh_targets {
        type ipv4_addr
        flags interval
        elements = { 192.168.10.10, 192.168.50.10, 192.168.70.10 }
    }

    set campus_auth_block {
        type ipv4_addr
        flags interval
        elements = { 192.168.50.80 }
    }

    set campus_wifi_controller {
        type ipv4_addr
        flags interval
        elements = { 192.168.10.100 }
    }

    set campus_jupyter_frontend {
        type ipv4_addr
        flags interval
        elements = { 192.168.70.30 }
    }

    set campus_public_web {
        type ipv4_addr
        flags interval
        elements = { 198.18.0.0/15, 198.51.100.0/24 }
    }

    chain input {
        type filter hook input priority 0; policy drop;
        iif "lo" accept
        ct state established,related accept
        ip protocol icmp accept

        iif "br-student" tcp dport { 80, 8443 } accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
        ct state established,related accept

        iif "br-student" oif "eth3" ip saddr @campus_students ip daddr @campus_public_web tcp dport { 80, 443, 8443 } ct state new accept
        iif "br-student" oif "eth3" ip saddr @campus_admins ip daddr @campus_public_web tcp dport { 80, 443, 8443 } ct state new accept
        iif "br-student" oif "eth3" ip saddr @campus_students ip daddr @campus_public_web icmp type echo-request ct state new accept
        iif "br-student" oif "eth3" ip saddr @campus_admins ip daddr @campus_public_web icmp type echo-request ct state new accept

        iif "br-student" oif "eth3" ip saddr @campus_students ip daddr @campus_shared_services udp dport { 53, 123, 67, 68 } ct state new accept
        iif "br-student" oif "eth3" ip saddr @campus_admins ip daddr @campus_shared_services udp dport { 53, 123, 67, 68 } ct state new accept
        iif "br-student" oif "eth3" ip saddr @campus_students ip daddr @campus_shared_services tcp dport { 53, 514 } ct state new accept
        iif "br-student" oif "eth3" ip saddr @campus_admins ip daddr @campus_shared_services tcp dport { 53, 514 } ct state new accept
        iif "br-student" oif "eth3" ip saddr @campus_students ip daddr @campus_wifi_controller icmp type echo-request ct state new accept
        iif "br-student" oif "eth3" ip saddr @campus_admins ip daddr @campus_wifi_controller icmp type echo-request ct state new accept
        iif "br-student" oif "eth3" ip saddr @campus_students ip daddr @campus_jupyter_frontend tcp dport 8080 ct state new accept
        iif "br-student" oif "eth3" ip saddr @campus_admins ip daddr @campus_jupyter_frontend tcp dport 8080 ct state new accept

        iif "br-student" oif "eth3" ip saddr @campus_students ip daddr @campus_student_ssh_targets tcp dport 22 ct state new accept
        iif "br-student" oif "eth3" ip saddr @campus_admins ip daddr @campus_admin_ssh_targets tcp dport 22 ct state new accept

        iif "br-student" oif "eth3" ip daddr @campus_auth_block tcp dport { 49, 389 } counter drop

        counter drop
    }
}
