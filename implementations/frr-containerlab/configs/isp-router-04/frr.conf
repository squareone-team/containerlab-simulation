frr version 9.1
frr defaults traditional
hostname isp-router-04
log syslog informational
!
interface lo
 ip address 100.64.0.4/32
!
interface eth1
 ip address 198.18.11.2/30
!
interface eth2
 ip address 198.18.12.2/30
!
interface eth3
 ip address 198.18.13.1/30
!
ip route 192.168.10.0/24 198.18.13.2
ip route 192.168.20.0/24 198.18.13.2
ip route 192.168.100.0/24 198.18.13.2
!
router bgp 64400
 no bgp ebgp-requires-policy
 bgp router-id 100.64.0.4
 neighbor 198.18.11.1 remote-as 64410
 neighbor 198.18.11.1 password ESI-BGP-SECRET
 neighbor 198.18.12.1 remote-as 64411
 neighbor 198.18.12.1 password ESI-BGP-SECRET
 neighbor 198.18.13.2 remote-as 64500
 neighbor 198.18.13.2 password ESI-BGP-SECRET
 address-family ipv4 unicast
  network 100.64.0.4/32
  neighbor 198.18.11.1 activate
  neighbor 198.18.12.1 activate
  neighbor 198.18.13.2 activate
 exit-address-family
!
line vty
