# SLURM Database Daemon Configuration
# ====================================
# Maintains job accounting database
# Runs on server-admin-01

AuthType=auth/munge
DbDriver=mysql
StorageLoc=slurm_acct_db
StoragePass=slurm_pass
StorageType=accounting_storage/mysql
StorageUser=slurm
StorageHost=192.168.50.10
StoragePort=3306
Debug=info
LogFile=/var/log/slurm/slurmdbd.log
PidFile=/var/run/slurmdbd.pid
SlurmUser=slurm
MessageTimeout=10
