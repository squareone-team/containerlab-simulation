# SLURM Configuration for ESI Datacenter Lab
# =============================================
# Controller: server-admin-01 (192.168.50.10)
# Workers: server-hpc-01, server-hpc-02 (192.168.70.0/24)
# Accounting: slurmdbd on same host as slurmctld

# Cluster Configuration
ClusterName=esi-hpc
SlurmUser=slurm
SlurmDir=/var/spool/slurm-llnl
SlurmdDebug=info
SlurmctldDebug=info
AccountingStorageType=accounting_storage/mysql
AccountingStorageHost=192.168.50.10
AccountingStorageUser=slurm
AccountingStoragePass=slurm_pass
AccountingStoragePort=3306

# AuthTypes
AuthType=auth/munge
MpiDefault=none
ProctrackType=proctrack/linuxproc

# Node Definitions
# cpu partition: hpc-01, hpc-02
# gpu partition: hpc-01 (if GPU present)
NodeName=hpc-01 NodeAddr=192.168.70.10 CPUs=4 RealMemory=7500 Gres=gpu:0 State=UNKNOWN
NodeName=hpc-02 NodeAddr=192.168.70.11 CPUs=4 RealMemory=7500 Gres=gpu:0 State=UNKNOWN

# Partition Definitions
PartitionName=cpu Nodes=hpc-01,hpc-02 Default=YES MaxTime=UNLIMITED State=UP
PartitionName=gpu Nodes=hpc-01 MaxTime=UNLIMITED State=UP

# Scheduling
SchedulerType=sched/backfill
FastSchedule=2
DefMemPerCPU=1900

# Logging
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
JobCompType=jobcomp/none
JobAcctGatherType=jobacct_gather/none

# Timeouts
SlurmdTimeout=300
SlurmctldTimeout=120
InactiveLimit=0
KillWait=30
MinJobAge=300
SlurmctldPort=6817

# Network
CommunicationParameters=NoAddressLookup,NoInAddrAny

# Quality of Service (QoS)
# Define limits per user group
QosName=cpu_default MaxCPUsPerUser=16 MaxSubmitJobsPerUser=100 MaxJobsPerUser=10 MaxTimeLimit=28800
QosName=gpu_standard MaxCPUsPerUser=8 MaxSubmitJobsPerUser=50 MaxJobsPerUser=5 MaxTimeLimit=14400
QosName=admin_qos MaxCPUsPerUser=unlimited MaxSubmitJobsPerUser=unlimited MaxJobsPerUser=unlimited MaxTimeLimit=unlimited

# User Association Defaults (will be set via sacctmgr in init script)
# students -> cpu partition, cpu_default QoS
# researchers -> cpu partition, cpu_default QoS
# gpu-users -> gpu partition, gpu_standard QoS
# admins -> all, admin_qos
