# SLURM Configuration for ESI Datacenter Lab
# =============================================
# Controller: server-admin-01 (192.168.50.10)
# Workers: server-hpc-01, server-hpc-02 (192.168.70.0/24)
# Accounting: slurmdbd on same host as slurmctld

# Cluster Configuration
ClusterName=esi-hpc
SlurmctldHost=server-admin-01(192.168.50.10)
SlurmUser=slurm
StateSaveLocation=/var/spool/slurm-llnl
SlurmdDebug=info
SlurmctldDebug=info
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=192.168.50.10
AccountingStoragePort=6819

# AuthTypes
AuthType=auth/munge
MpiDefault=none
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
SlurmdSpoolDir=/var/spool/slurmd

# Node Definitions
# cpu partition: server-hpc-01, server-hpc-02
# gpu partition: server-hpc-01 (if GPU present)
NodeName=server-hpc-01 NodeAddr=192.168.70.10 CPUs=4 RealMemory=7500 Gres=gpu:0 State=UNKNOWN
NodeName=server-hpc-02 NodeAddr=192.168.70.20 CPUs=4 RealMemory=7500 Gres=gpu:0 State=UNKNOWN

# Partition Definitions
PartitionName=cpu Nodes=server-hpc-01,server-hpc-02 Default=YES MaxTime=UNLIMITED State=UP
PartitionName=gpu Nodes=server-hpc-01 MaxTime=UNLIMITED State=UP

# Scheduling
SchedulerType=sched/backfill
SlurmdParameters=config_overrides
DefMemPerCPU=1900
# Auto-resume nodes when they reconnect
ReturnToService=2

# Logging
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
JobCompType=jobcomp/none
JobAcctGatherType=jobacct_gather/none

# Timeouts
SlurmdTimeout=300
SlurmctldTimeout=120
InactiveLimit=0
KillWait=30
MinJobAge=300
SlurmctldPort=6817
SrunPortRange=60001-60100

# Network
CommunicationParameters=NoAddressLookup,NoInAddrAny

# Quality of Service (QoS)
# Define limits per user group
# QoS is stored in database via sacctmgr, removed from here

# User Association Defaults (will be set via sacctmgr in init script)
# students -> cpu partition, cpu_default QoS
# researchers -> cpu partition, cpu_default QoS
# gpu-users -> gpu partition, gpu_standard QoS
# admins -> all, admin_qos
