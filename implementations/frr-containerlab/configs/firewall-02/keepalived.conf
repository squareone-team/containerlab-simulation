! Keepalived configuration for firewall-02 (BACKUP)
! VIPs: inside 192.168.1.254/24, outside 203.0.113.14/29, campus 10.200.0.1/29

global_defs {
    router_id firewall-02
    script_user root
    enable_script_security
}

vrrp_script check_health {
    script "/usr/local/bin/check_firewall_health.sh"
    interval 2
    weight -20
    fall 2
    rise 2
}

vrrp_instance Ring1_VIP {
    state BACKUP
    interface bond0
    virtual_router_id 51
    priority 100
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass ESI_Ring1_FW
    }

    virtual_ipaddress {
        192.168.1.254/24 dev bond0
        203.0.113.14/29 dev eth4
        10.200.0.1/29 dev eth5
    }

    track_interface {
        bond0
        eth4
        eth5
    }

    track_script {
        check_health
    }

    notify_master "/usr/local/bin/notify_master.sh"
    notify_backup "/usr/local/bin/notify_backup.sh"
    notify_fault "/usr/local/bin/notify_fault.sh"
}
