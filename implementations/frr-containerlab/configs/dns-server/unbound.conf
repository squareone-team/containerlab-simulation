##########################################################################
# unbound.conf — ESI Datacenter DNS Recursive Resolver
# Node     : dns-server (192.168.50.30)
# VNI      : 10050 (CORE-INFRA) | VRF-STAFF | admin-leaf-01/02 (leaf-03/04)
# Owner    : Zitouni — T4 (feature/protocols-monitoring)
# Change   : Change 7 — DNS split-horizon NXDOMAIN from VRF-PUBLIC
#
# Architecture (from architecture_spec_refinement.pdf):
#   - Unbound = recursive resolver for ALL internal VRFs
#   - esi.internal. = local static zone (simulates BIND9 authoritativeness)
#   - VRF-PUBLIC (198.51.100.0/24) gets NXDOMAIN for esi.internal.*
#   - All other internal VRFs get full resolution
##########################################################################

server:
  # -----------------------------------------------------------------------
  # Network & Identity
  # -----------------------------------------------------------------------
  verbosity:            1
  interface: 0.0.0.0
  port:                 53
  do-ip4:               yes
  do-ip6:               no
  do-udp:               yes
  do-tcp:               yes

  # Only allow queries from known address space
  # (per-view access also limits scope; these are hard outer limits)
  access-control: 127.0.0.0/8       allow
  access-control: 10.0.0.0/8        allow   # underlay P2P + loopbacks
  access-control: 172.16.0.0/12     allow   # OOB management
  access-control: 192.168.0.0/16    allow   # all VNI server subnets
  access-control: 198.51.100.0/24   allow   # DMZ view


  # -----------------------------------------------------------------------
  # Performance & Reliability
  # -----------------------------------------------------------------------
  num-threads:          2
  msg-cache-size:       16m
  rrset-cache-size:     32m
  cache-min-ttl:        30
  cache-max-ttl:        86400
  prefetch:             yes
  prefetch-key:         yes
  so-reuseport:         yes

  # -----------------------------------------------------------------------
  # Security hardening
  # -----------------------------------------------------------------------
  hide-identity:        yes
  hide-version:         yes
  harden-glue:          yes
  harden-dnssec-stripped: yes
  use-caps-for-id:      yes
  val-clean-additional: yes

  # DNSSEC (permissive — no root anchor in this simulation)
  module-config:        "iterator"

  # -----------------------------------------------------------------------
  # Split-horizon view routing
  #   internal → full esi.internal visibility
  #   dmz      → NXDOMAIN for esi.internal (Change 7 requirement)
  # -----------------------------------------------------------------------

  # INTERNAL views — all production VRF subnets
  access-control-view: 192.168.10.0/24  internal   # VRF-PEDAGOGY  STUDENT-TP
  access-control-view: 192.168.20.0/24  internal   # VRF-PEDAGOGY  STUDENT-PROJ
  access-control-view: 192.168.30.0/24  internal   # VRF-STAFF     LMS-STAFF
  access-control-view: 192.168.40.0/24  internal   # VRF-STAFF     SERVICES-WEB
  access-control-view: 192.168.50.0/24  internal   # VRF-STAFF     CORE-INFRA
  access-control-view: 192.168.60.0/24  internal   # VRF-ADMINISTRATION HR-FINANCE
  access-control-view: 192.168.70.0/24  internal   # VRF-STAFF     AI-GPU
  access-control-view: 192.168.80.0/24  internal   # VRF-STAFF     STORAGE-SAN
  access-control-view: 192.168.90.0/24  internal   # VRF-ORIENTATION BAC-ORIENT
  access-control-view: 192.168.110.0/24 internal   # campus edge behind campus-bp
  access-control-view: 10.0.0.0/8       internal   # underlay (infra queries)
  access-control-view: 172.16.0.0/24    internal   # OOB management
  access-control-view: 172.20.20.0/24   dmz

  # DMZ view — VRF-PUBLIC; NXDOMAIN for esi.internal per Change 7
  access-control-view: 198.51.100.0/24 dmz        # VRF-PUBLIC DMZ-WEB

  # Loopback and localhost
  access-control-view: 127.0.0.0/8      internal

##########################################################################
# VIEW: internal
# Clients: all VRFs except VRF-PUBLIC
# Behaviour: Full recursive resolution + authoritative esi.internal zone
##########################################################################
view:
  name: "internal"

  # Allow forwarding through to internet (internal VRFs have internet access
  # via VRF-PEDAGOGY and VRF-STAFF default route through the firewalls)
  local-zone: "." transparent

  # -----------------------------------------------------------------------
  # esi.internal — static local zone
  # All A records match Section 1.1 Node Inventory in context.md
  # -----------------------------------------------------------------------
  local-zone: "esi.internal."     static
  local-zone: "moodle.esi.dz."    static
  local-zone: "google.com."       static
  local-zone: "50.168.192.in-addr.arpa." static   # reverse for CORE-INFRA

  # --- Spine switches ---
  local-data: "spine-01.esi.internal.    300 IN A 10.1.0.1"
  local-data: "spine-02.esi.internal.    300 IN A 10.1.0.2"

  # --- Border leaf pair (leaf-01/02) ---
  local-data: "leaf-01.esi.internal.     300 IN A 10.1.0.11"
  local-data: "border-leaf-01.esi.internal. 300 IN A 10.1.0.11"
  local-data: "leaf-02.esi.internal.     300 IN A 10.1.0.12"
  local-data: "border-leaf-02.esi.internal. 300 IN A 10.1.0.12"

  # --- Admin leaf pair (leaf-03/04) ---
  local-data: "leaf-03.esi.internal.     300 IN A 10.1.0.13"
  local-data: "admin-leaf-01.esi.internal. 300 IN A 10.1.0.13"
  local-data: "leaf-04.esi.internal.     300 IN A 10.1.0.14"
  local-data: "admin-leaf-02.esi.internal. 300 IN A 10.1.0.14"

  # --- AI/HPC leaf pair (leaf-05/06) ---
  local-data: "leaf-05.esi.internal.     300 IN A 10.1.0.15"
  local-data: "hpc-leaf-01.esi.internal. 300 IN A 10.1.0.15"
  local-data: "leaf-06.esi.internal.     300 IN A 10.1.0.16"
  local-data: "hpc-leaf-02.esi.internal. 300 IN A 10.1.0.16"
  local-data: "hpc-jupyter.esi.internal. 300 IN A 192.168.70.30"

  # --- Storage leaf pair (leaf-07/08) ---
  local-data: "leaf-07.esi.internal.     300 IN A 10.1.0.17"
  local-data: "storage-leaf-01.esi.internal. 300 IN A 10.1.0.17"
  local-data: "leaf-08.esi.internal.     300 IN A 10.1.0.18"
  local-data: "storage-leaf-02.esi.internal. 300 IN A 10.1.0.18"

  # --- Student leaf pair (leaf-09/10) ---
  local-data: "leaf-09.esi.internal.     300 IN A 10.1.0.19"
  local-data: "student-leaf-01.esi.internal. 300 IN A 10.1.0.19"
  local-data: "leaf-10.esi.internal.     300 IN A 10.1.0.20"
  local-data: "student-leaf-02.esi.internal. 300 IN A 10.1.0.20"

  # --- ISP routers (loopbacks for management only) ---
  local-data: "isp-router-01.esi.internal. 300 IN A 100.64.0.1"
  local-data: "isp-router-02.esi.internal. 300 IN A 100.64.0.2"
  local-data: "isp-router-03.esi.internal. 300 IN A 100.64.0.3"

  # --- Firewalls (HA NGFW pair) ---
  local-data: "firewall-01.esi.internal.  300 IN A 192.168.1.1"
  local-data: "firewall-02.esi.internal.  300 IN A 192.168.1.2"
  local-data: "firewall-vip.esi.internal. 300 IN A 192.168.1.254"

  # --- OOB / Management servers ---
  local-data: "bastion-01.esi.internal.   300 IN A 172.16.0.50"
  local-data: "bastion.esi.internal.      300 IN A 172.16.0.50"
  local-data: "ids-01.esi.internal.       300 IN A 172.16.0.51"
  local-data: "ids.esi.internal.          300 IN A 172.16.0.51"

  # --- CORE-INFRA services (VNI 10050, 192.168.50.0/24) ---
  local-data: "ntp-server.esi.internal.   300 IN A 192.168.50.20"
  local-data: "ntp.esi.internal.          300 IN A 192.168.50.20"
  local-data: "dns-server.esi.internal.   300 IN A 192.168.50.30"
  local-data: "dns.esi.internal.          300 IN A 192.168.50.30"
  local-data: "dhcp-server.esi.internal.  300 IN A 192.168.50.40"
  local-data: "dhcp.esi.internal.         300 IN A 192.168.50.40"
  local-data: "zabbix-server.esi.internal. 300 IN A 192.168.50.50"
  local-data: "zabbix.esi.internal.       300 IN A 192.168.50.50"
  local-data: "prometheus.esi.internal.   300 IN A 192.168.50.60"
  local-data: "syslog-server.esi.internal. 300 IN A 192.168.50.70"
  local-data: "syslog.esi.internal.       300 IN A 192.168.50.70"

  # --- Storage pod server (FTP / SAN) ---
  local-data: "ftp-server.esi.internal.   300 IN A 192.168.80.10"
  local-data: "ftp.esi.internal.          300 IN A 192.168.80.10"

  # --- DMZ test service published to internal and campus clients ---
  local-data: "dmz-server-01.esi.internal. 300 IN A 198.51.100.10"
  local-data: "dmz-web.esi.internal.       300 IN A 198.51.100.10"
  local-data: "moodle.esi.dz.              300 IN A 198.51.100.30"
  local-data: "www.google.com.             300 IN A 198.18.3.10"

  # --- WiFi controller (VRF-PEDAGOGY, student-leaf; mgmt via VRF-WIFI-CTRL) ---
  local-data: "wifi-controller.esi.internal. 300 IN A 192.168.10.100"
  local-data: "wifi.esi.internal.          300 IN A 192.168.10.100"

  # -----------------------------------------------------------------------
  # Reverse PTR records — CORE-INFRA (192.168.50.0/24)
  # -----------------------------------------------------------------------
  local-data-ptr: "192.168.50.20  ntp-server.esi.internal."
  local-data-ptr: "192.168.50.30  dns-server.esi.internal."
  local-data-ptr: "192.168.50.40  dhcp-server.esi.internal."
  local-data-ptr: "192.168.50.50  zabbix-server.esi.internal."
  local-data-ptr: "192.168.50.60  prometheus.esi.internal."
  local-data-ptr: "192.168.50.70  syslog-server.esi.internal."

  # -----------------------------------------------------------------------
  # Negative answer for any other esi.internal lookup
  # (prevents SERVFAIL leaking to upstream for private zone queries)
  # -----------------------------------------------------------------------
  local-zone: "1.10.in-addr.arpa."   static   # spine/leaf loopbacks reverse


##########################################################################
# VIEW: dmz
# Clients: VRF-PUBLIC (198.51.100.0/24) — DMZ-WEB segment
# Behaviour: NXDOMAIN for esi.internal; transparent (public) for all else
# Change 7 requirement: "query for an internal hostname from the DMZ
#                        returns NXDOMAIN"
##########################################################################
view:
  name: "dmz"

  # Block ALL esi.internal visibility — return NXDOMAIN (refuse = NXDOMAIN)
  local-zone: "esi.internal."            refuse
  local-zone: "50.168.192.in-addr.arpa." refuse   # CORE-INFRA reverse
  local-zone: "1.10.in-addr.arpa."       refuse   # loopback reverse
  local-zone: "16.172.in-addr.arpa."     refuse   # OOB reverse
  local-zone: "168.192.in-addr.arpa."    refuse   # all 192.168.x.x reverse

  # Public internet queries pass through normally
  local-zone: "." transparent
