frr version 8.4_git
frr defaults traditional
hostname leaf-03
log syslog informational
no ipv6 forwarding
!
vrf VRF-ADMINISTRATION
 vni 50010
exit-vrf
!
vrf VRF-STAFF
 vni 50020
 ip route 192.168.10.0/24 192.168.1.254 nexthop-vrf default
 ip route 192.168.80.0/24 192.168.1.254 nexthop-vrf default
exit-vrf
!
interface eth1
 description P2P to spine-01
 ip address 10.0.0.5/31
exit
!
interface eth2
 description P2P to spine-02
 ip address 10.0.1.5/31
exit
!
interface lo
 ip address 10.1.0.13/32
exit
!
interface vlan30
 description LMS-STAFF anycast gateway
 vrf VRF-STAFF
 ip address 192.168.30.1/24
!
interface vlan40
 description SERVICES-WEB anycast gateway
 vrf VRF-STAFF
 ip address 192.168.40.1/24
!
router bgp 65002
 bgp router-id 10.1.0.13
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 bgp bestpath as-path multipath-relax
 neighbor FABRIC peer-group
 neighbor FABRIC bfd
 neighbor FABRIC password ESI-BGP-SECRET
 neighbor FABRIC timers 3 9
 neighbor 10.0.0.4 remote-as 65000
 neighbor 10.0.0.4 peer-group FABRIC
 neighbor 10.0.1.4 remote-as 65000
 neighbor 10.0.1.4 peer-group FABRIC
 !
 address-family ipv4 unicast
  network 10.1.0.13/32
  neighbor FABRIC soft-reconfiguration inbound
  neighbor FABRIC allowas-in 2
  maximum-paths 2
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor FABRIC activate
  neighbor FABRIC allowas-in 2
  advertise-all-vni
 exit-address-family
exit
!
router bgp 65002 vrf VRF-STAFF
 !
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.13:50020
  route-target import 65000:50020
  route-target export 65000:50020
 exit-address-family
exit
!
router bgp 65002 vrf VRF-ADMINISTRATION
 !
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.13:50010
  route-target import 65000:50010
  route-target export 65000:50010
 exit-address-family
exit
!
