frr version 9.1
frr defaults traditional
hostname leaf-02
log syslog informational
no ipv6 forwarding
!
vrf VRF-PEDAGOGY
 vni 50030
!
vrf VRF-STAFF
 vni 50020
!
vrf VRF-PUBLIC
 vni 50040
!
vrf VRF-ORIENTATION
 vni 50050
!
interface lo
 ip address 10.1.0.12/32
!
interface eth1
 description P2P to spine-01
 ip address 10.0.0.3/31
!
interface eth2
 description P2P to spine-02
 ip address 10.0.1.3/31
!
agentx
router bgp 65001
 no bgp ebgp-requires-policy
 bgp router-id 10.1.0.12
 bgp log-neighbor-changes
 bgp bestpath as-path multipath-relax
 neighbor FABRIC peer-group
 neighbor FABRIC bfd
 neighbor FABRIC timers 3 9
 neighbor FABRIC password ESI-BGP-INTERNAL
 neighbor FABRIC allowas-in 2
 neighbor 10.0.0.2 remote-as 65000
 neighbor 10.0.0.2 peer-group FABRIC
 neighbor 10.0.1.2 remote-as 65000
 neighbor 10.0.1.2 peer-group FABRIC
 !
 address-family ipv4 unicast
  network 10.1.0.12/32
  neighbor FABRIC soft-reconfiguration inbound
  maximum-paths 2
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor FABRIC activate
  neighbor FABRIC allowas-in 2
  advertise-all-vni
 exit-address-family
exit
!
ip route 192.168.30.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.40.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.50.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.60.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.70.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.80.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 10.200.0.0/29 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.110.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 198.51.100.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.10.0/24 192.168.1.254 nexthop-vrf default vrf VRF-STAFF
ip route 192.168.20.0/24 192.168.1.254 nexthop-vrf default vrf VRF-STAFF
ip route 10.200.0.0/29 192.168.1.254 nexthop-vrf default vrf VRF-STAFF
ip route 192.168.110.0/24 192.168.1.254 nexthop-vrf default vrf VRF-STAFF
ip route 198.51.100.0/24 192.168.1.254 nexthop-vrf default vrf VRF-STAFF
ip route 198.51.100.10/32 192.168.1.254 nexthop-vrf default vrf VRF-STAFF
ip route 0.0.0.0/0 192.168.1.254 nexthop-vrf default vrf VRF-PUBLIC
router bgp 65001 vrf VRF-PEDAGOGY
 address-family ipv4 unicast
  redistribute static
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
 rd 10.1.0.12:50030
  route-target both 65000:50030
 exit-address-family
!
router bgp 65001 vrf VRF-STAFF
 address-family ipv4 unicast
  redistribute static
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.12:50020
  route-target both 65000:50020
 exit-address-family
!
router bgp 65001 vrf VRF-PUBLIC
 address-family ipv4 unicast
  redistribute connected
  redistribute static
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.12:50040
  route-target both 65000:50040
 exit-address-family
!
router bgp 65001 vrf VRF-ORIENTATION
 address-family ipv4 unicast
  redistribute static
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.12:50050
  route-target both 65000:50050
 exit-address-family
!
line vty
