frr version 8.4_git
frr defaults traditional
hostname leaf-02
log syslog informational
no ipv6 forwarding
!
# --- CONFIGURATION GLOBALE EVPN MH ---
# Nécessaire pour activer le mode Multi-Homing
evpn
 mac-vni-filter
 exit
!
# --- VRFs ---
vrf VRF-ORIENTATION
 vni 50050
exit-vrf
!
vrf VRF-PEDAGOGY
 vni 50030
 ip route 0.0.0.0/0 Null0
exit-vrf
!
vrf VRF-PUBLIC
 vni 50040
exit-vrf
!
vrf VRF-STAFF
 vni 50020
 ip route 0.0.0.0/0 Null0
exit-vrf
!
# --- INTERFACES FABRIC ---
interface eth1
 description P2P to spine-01
 ip address 10.0.0.3/31
exit
!
interface eth2
 description P2P to spine-02
 ip address 10.0.1.3/31
exit
!
interface eth3
 description eBGP to isp-router-02
 ip address 203.0.113.5/30
exit
!
# --- INTERFACES MULTI-HOMING (ESI) ---
interface eth5
 description Link-to-Firewall-02-ESI
 # Doit être identique au Leaf-01
 evpn mh es-id 1
 evpn mh es-sys-mac 00:11:22:33:44:01
exit
!
interface eth7
 description Link-to-Server-DMZ-01-ESI
 # Doit être identique au Leaf-01
 evpn mh es-id 2
 evpn mh es-sys-mac 00:11:22:33:44:01
exit
!
interface lo
 ip address 10.1.0.12/32
exit
!
# --- BGP CONFIGURATION ---
router bgp 65001
 bgp router-id 10.1.0.12
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 bgp bestpath as-path multipath-relax
 
 # Configuration des voisins Fabric
 neighbor FABRIC peer-group
 neighbor FABRIC remote-as 65000
 neighbor FABRIC bfd
 neighbor FABRIC password ESI-BGP-SECRET
 neighbor FABRIC timers 3 9
 
 neighbor 10.0.0.2 peer-group FABRIC
 neighbor 10.0.1.2 peer-group FABRIC
 
 neighbor ISP-EXT peer-group
 neighbor ISP-EXT remote-as 64501
 neighbor ISP-EXT password ESI-BGP-SECRET
 neighbor 203.0.113.6 peer-group ISP-EXT

 address-family ipv4 unicast
  network 10.1.0.12/32
  neighbor FABRIC soft-reconfiguration inbound
  neighbor FABRIC allowas-in 2
  maximum-paths 2
 exit-address-family

 address-family l2vpn evpn
  neighbor FABRIC activate
  neighbor FABRIC allowas-in 2
  advertise-all-vni
  # Commande CRITIQUE pour le Multi-homing :
  advertise-default-gw
 exit-address-family
exit

# --- VRF BGP (Exemple pour STAFF) ---
router bgp 65001 vrf VRF-STAFF
 address-family ipv4 unicast
  redistribute connected
  redistribute static
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.12:50020
  route-target import 65000:50020
  route-target export 65000:50020
 exit-address-family
exit

# [Répéter la même logique pour les autres VRFs...]