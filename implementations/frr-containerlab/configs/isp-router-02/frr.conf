frr version 9.1
frr defaults traditional
hostname isp-router-02
log syslog informational
!
interface lo
 ip address 100.64.0.2/32
!
interface eth1
 ip address 203.0.113.6/30
!
router bgp 64501
 no bgp ebgp-requires-policy
 bgp router-id 100.64.0.2
 neighbor 203.0.113.5 remote-as 65001
 neighbor 203.0.113.5 password ESI-BGP-EXTERNAL
 address-family ipv4 unicast
  network 100.64.0.2/32
  neighbor 203.0.113.5 activate
  neighbor 203.0.113.5 default-originate
  neighbor 203.0.113.5 route-map BORDER-DEFAULT-ONLY out
 exit-address-family
!
ip prefix-list BORDER-OUT seq 5 permit 0.0.0.0/0
ip prefix-list BORDER-OUT seq 10 deny any
route-map BORDER-DEFAULT-ONLY permit 10
 match ip address prefix-list BORDER-OUT
!
line vty
