frr version 8.4_git
frr defaults traditional
hostname leaf-01
domainname localdomain
log syslog informational
no ipv6 forwarding
!
vrf VRF-ORIENTATION
 vni 50050
exit-vrf
!
vrf VRF-PEDAGOGY
 vni 50030
exit-vrf
!
vrf VRF-STAFF
 vni 50020
exit-vrf
!
vrf VRF-PUBLIC
 vni 50040
exit-vrf
!
vrf VRF-WIFI-CTRL
 vni 50060
exit-vrf
!
interface eth3
 description eBGP to isp-router-01
 ip address 203.0.113.1/30
exit
!
interface eth8
 description Campus WiFi management uplink
exit
!
interface vlan120
 description WIFI-CTRL-MGMT bridge VLAN
exit
!
interface eth1
 description P2P to spine-01
 ip address 10.0.0.1/31
exit
!
interface eth2
 description P2P to spine-02
 ip address 10.0.1.1/31
exit
!
interface eth4
 description eBGP to isp-router-03
 ip address 203.0.114.1/30
exit
!
interface lo
 ip address 10.1.0.11/32
exit
!
agentx
router bgp 65001
 bgp router-id 10.1.0.11
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 bgp bestpath as-path multipath-relax
 neighbor FABRIC peer-group
 neighbor FABRIC bfd
 neighbor FABRIC password ESI-BGP-INTERNAL
 neighbor FABRIC timers 3 9
 neighbor ISP-EXT peer-group
 neighbor ISP-EXT password ESI-BGP-EXTERNAL
 neighbor 10.0.0.0 remote-as 65000
 neighbor 10.0.0.0 peer-group FABRIC
 neighbor 10.0.1.0 remote-as 65000
 neighbor 10.0.1.0 peer-group FABRIC
 neighbor 203.0.113.2 remote-as 64500
 neighbor 203.0.113.2 peer-group ISP-EXT
 neighbor 203.0.114.2 remote-as 64502
 neighbor 203.0.114.2 peer-group ISP-EXT
 !
 address-family ipv4 unicast
  network 10.1.0.11/32
  neighbor FABRIC soft-reconfiguration inbound
  neighbor FABRIC allowas-in 2
  neighbor 203.0.114.2 maximum-prefix 100 80
  maximum-paths 2
  import vrf VRF-PUBLIC
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor FABRIC activate
  neighbor FABRIC allowas-in 2
  advertise-all-vni
 exit-address-family
exit
!
ip route 192.168.30.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.40.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.50.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.60.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.70.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.80.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 198.51.100.0/24 192.168.1.254 nexthop-vrf default vrf VRF-PEDAGOGY
ip route 192.168.10.0/24 192.168.1.254 nexthop-vrf default vrf VRF-STAFF
ip route 192.168.20.0/24 192.168.1.254 nexthop-vrf default vrf VRF-STAFF
ip route 10.200.0.0/30 192.168.1.254 nexthop-vrf default vrf VRF-STAFF
ip route 192.168.110.0/24 192.168.1.254 nexthop-vrf default vrf VRF-STAFF
!
router bgp 65001 vrf VRF-PUBLIC
 bgp router-id 10.1.0.11
 neighbor ISP-PUBLIC peer-group
 neighbor ISP-PUBLIC password ESI-BGP-EXTERNAL
 neighbor ISP-PUBLIC timers 3 9
 neighbor 203.0.113.2 remote-as 64500
 neighbor 203.0.113.2 peer-group ISP-PUBLIC
 !
 address-family ipv4 unicast
  redistribute connected
  neighbor 203.0.113.2 maximum-prefix 100 80
  neighbor 203.0.113.2 prefix-list ISP-IN in
  neighbor 203.0.113.2 prefix-list ISP-OUT out
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.11:50040
  route-target import 65000:50040
  route-target export 65000:50040
 exit-address-family
exit
!
router bgp 65001 vrf VRF-PEDAGOGY
 !
 address-family ipv4 unicast
  redistribute static
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.11:50030
  route-target import 65000:50030
  route-target export 65000:50030
 exit-address-family
exit
!
router bgp 65001 vrf VRF-STAFF
 !
 address-family ipv4 unicast
  redistribute static
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.11:50020
  route-target import 65000:50020
  route-target export 65000:50020
 exit-address-family
exit
!
router bgp 65001 vrf VRF-ORIENTATION
 !
 address-family ipv4 unicast
  redistribute static
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.11:50050
  route-target import 65000:50050
  route-target export 65000:50050
 exit-address-family
exit
!
router bgp 65001 vrf VRF-WIFI-CTRL
 !
 address-family ipv4 unicast
  redistribute static
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.11:50060
  route-target import 65000:50060
  route-target export 65000:50060
 exit-address-family
exit
!
ip prefix-list ISP-IN seq 5 permit 0.0.0.0/0
ip prefix-list ISP-IN seq 10 deny any
ip prefix-list ISP-OUT seq 5 deny 10.0.0.0/8 le 32
ip prefix-list ISP-OUT seq 10 deny 172.16.0.0/12 le 32
ip prefix-list ISP-OUT seq 15 deny 192.168.0.0/16 le 32
ip prefix-list ISP-OUT seq 20 permit any
!
