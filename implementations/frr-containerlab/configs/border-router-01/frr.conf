frr version 9.1
frr defaults traditional
hostname border-router-01
log syslog informational
no ipv6 forwarding
!
interface lo
 ip address 100.64.1.1/32
!
interface eth1
 description eBGP to isp-router-01
 ip address 203.0.113.1/30
!
interface eth4
 description eBGP to isp-router-03-bac
 ip address 203.0.113.5/30
!
router bgp 65010
 no bgp ebgp-requires-policy
 bgp router-id 100.64.1.1
 bgp log-neighbor-changes
 neighbor ISP-UPSTREAM peer-group
 neighbor ISP-UPSTREAM password ESI-BGP-EXTERNAL
 neighbor ISP-UPSTREAM timers 3 9
 neighbor 203.0.113.2 remote-as 64500
 neighbor 203.0.113.2 peer-group ISP-UPSTREAM
 neighbor 203.0.113.6 remote-as 64501
 neighbor 203.0.113.6 peer-group ISP-UPSTREAM
 !
 address-family ipv4 unicast
  network 198.51.100.0/24
  network 203.0.113.8/29
  neighbor 203.0.113.2 prefix-list ISP-IN in
  neighbor 203.0.113.2 prefix-list ISP-OUT out
  neighbor 203.0.113.2 maximum-prefix 100 80
    neighbor 203.0.113.6 prefix-list ISP-IN in
    neighbor 203.0.113.6 prefix-list ISP-OUT out
    neighbor 203.0.113.6 maximum-prefix 100 80
 exit-address-family
exit
!
ip prefix-list ISP-IN seq 5 permit 0.0.0.0/0
ip prefix-list ISP-IN seq 10 deny any
ip prefix-list ISP-OUT seq 5 permit 198.51.100.0/24
ip prefix-list ISP-OUT seq 10 permit 203.0.113.8/29
ip prefix-list ISP-OUT seq 20 deny 10.0.0.0/8 le 32
ip prefix-list ISP-OUT seq 30 deny 172.16.0.0/12 le 32
ip prefix-list ISP-OUT seq 40 deny 192.168.0.0/16 le 32
ip prefix-list ISP-OUT seq 50 deny any
!
line vty
