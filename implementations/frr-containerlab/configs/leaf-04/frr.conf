frr version 9.1
frr defaults traditional
hostname leaf-04
log syslog informational
no ipv6 forwarding
!
vrf VRF-STAFF
 vni 50020
!
vrf VRF-ADMINISTRATION
 vni 50010
!
interface lo
 ip address 10.1.0.14/32
!
interface eth1
 description P2P to spine-01
 ip address 10.0.0.7/31
!
interface eth2
 description P2P to spine-02
 ip address 10.0.1.7/31
!
interface vlan30
 description LMS-STAFF anycast gateway
 vrf VRF-STAFF
 ip address 192.168.30.1/24
!
interface vlan40
 description SERVICES-WEB anycast gateway
 vrf VRF-STAFF
 ip address 192.168.40.1/24
!
agentx
router bgp 65002
 no bgp ebgp-requires-policy
 bgp router-id 10.1.0.14
 bgp log-neighbor-changes
 bgp bestpath as-path multipath-relax
 neighbor FABRIC peer-group
 neighbor FABRIC bfd
 neighbor FABRIC timers 3 9
 neighbor FABRIC password ESI-BGP-INTERNAL
 neighbor FABRIC allowas-in 2
 neighbor 10.0.0.6 remote-as 65000
 neighbor 10.0.0.6 peer-group FABRIC
 neighbor 10.0.1.6 remote-as 65000
 neighbor 10.0.1.6 peer-group FABRIC
 !
 address-family ipv4 unicast
  network 10.1.0.14/32
  neighbor FABRIC soft-reconfiguration inbound
  maximum-paths 2
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor FABRIC activate
  neighbor FABRIC allowas-in 2
  advertise-all-vni
 exit-address-family
!
router bgp 65002 vrf VRF-STAFF
 address-family ipv4 unicast
  redistribute connected
  import vrf default
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.14:50020
  route-target both 65000:50020
 exit-address-family
!
router bgp 65002 vrf VRF-ADMINISTRATION
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.14:50010
  route-target both 65000:50010
 exit-address-family
!
! --- Paire 02 ADMIN (Ikram) - Leaf-04 ---
interface eth3
 description Link-to-Server-Admin-01
 ! ID unique pour ce serveur
 evpn mh es-id 3
 evpn mh es-sys-mac 00:11:22:33:44:02
!
interface eth5
 description Link-to-Server-Admin-02
 ! ID unique pour ce serveur
 evpn mh es-id 4
 evpn mh es-sys-mac 00:11:22:33:44:02
!
line vty
