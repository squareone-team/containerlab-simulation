#!/usr/sbin/nft -f
# nftables configuration for firewall-01 and firewall-02
# ESI Datacenter - Ring 1 HA Firewall
# Security Policy: Stateful Deny-by-Default

flush ruleset

# Define table
table inet filter {
    set cluster_1_pedagogy {
        type ipv4_addr
        flags interval
        elements = { 192.168.10.0/24, 192.168.20.0/24 }
    }

    set cluster_2_admin {
        type ipv4_addr
        flags interval
        elements = { 192.168.50.0/24, 192.168.60.0/24 }
    }

    set cluster_3_hpc {
        type ipv4_addr
        flags interval
        elements = { 192.168.70.0/24 }
    }

    set cluster_5_storage {
        type ipv4_addr
        flags interval
        elements = { 192.168.80.0/24 }
    }

    set cluster_4_orientation {
        type ipv4_addr
        flags interval
        elements = { 192.168.90.0/24 }
    }

    set cluster_public_dmz {
        type ipv4_addr
        flags interval
        elements = { 198.51.100.0/24 }
    }

    set internet_public_web {
        type ipv4_addr
        flags interval
        elements = { 198.18.0.0/15 }
    }

    set cluster_lms_staff {
        type ipv4_addr
        flags interval
        elements = { 192.168.30.0/24 }
    }

    set moodle_frontend {
        type ipv4_addr
        flags interval
        elements = { 198.51.100.30 }
    }

    set moodle_db_storage {
        type ipv4_addr
        flags interval
        elements = { 192.168.80.31 }
    }

    set cluster_campus_access {
        type ipv4_addr
        flags interval
        elements = { 10.200.0.0/30, 192.168.110.0/24 }
    }

    set campus_ssh_targets {
        type ipv4_addr
        flags interval
        elements = { 192.168.10.10, 192.168.50.10, 192.168.70.10 }
    }

    set campus_nac_gateway {
        type ipv4_addr
        flags interval
        elements = { 192.168.110.1 }
    }

    set vpn_gateway {
        type ipv4_addr
        flags interval
        elements = { 198.51.100.20 }
    }

    set core_infra_dns {
        type ipv4_addr
        flags interval
        elements = { 192.168.50.30 }
    }

    set core_infra_ntp {
        type ipv4_addr
        flags interval
        elements = { 192.168.50.20 }
    }

    set core_infra_dhcp {
        type ipv4_addr
        flags interval
        elements = { 192.168.50.40 }
    }

    set core_infra_syslog {
        type ipv4_addr
        flags interval
        elements = { 192.168.50.70 }
    }

    set core_infra_auth {
        type ipv4_addr
        flags interval
        elements = { 192.168.50.80 }
    }

    set tacacs_auth_clients {
        type ipv4_addr
        flags interval
        elements = { 192.168.10.10, 192.168.50.10, 192.168.70.10 }
    }

    set vpn_student_ssh_targets {
        type ipv4_addr
        flags interval
        elements = { 192.168.10.10, 192.168.70.10 }
    }

    # ============================================================================
    # INPUT CHAIN - Traffic destined to the firewall itself
    # ============================================================================
    chain input {
        type filter hook input priority 0; policy drop;

        # Accept loopback traffic
        iif lo counter accept

        # Accept established and related connections
        ct state { established, related } counter accept

        # ICMP for operational checks (including VIP ping test)
        ip protocol icmp counter accept

        # Keepalived VRRP advertisements (IP protocol 112)
        ip protocol 112 counter accept

        counter drop
    }

    # ============================================================================
    # FORWARD CHAIN - Transit traffic between VRFs
    # ============================================================================
    chain forward {
        type filter hook forward priority 0; policy drop;

        # Rule 1: Accept established and related stateful connections
        # This is CRUCIAL for allowing return traffic in one-directional rules
        ct state { established, related } counter accept

        # ========== RULE 2: Cluster 1 (Pedagogy) → Cluster 5 (Storage) ==========
        # Allow Cluster 1 to reach Storage for iSCSI/NFS
        # Ports: 111 (RPC), 2049 (NFS), 3260 (iSCSI)
        ip saddr @cluster_1_pedagogy ip daddr @cluster_5_storage tcp dport { 111, 2049, 3260 } ct state new counter accept
        ip saddr @cluster_1_pedagogy ip daddr @cluster_5_storage udp dport { 111, 2049 } ct state new counter accept

        # ========== RULE 3: Cluster 2 (Admin) → Cluster 1 (Pedagogy) ==========
        # Allow Admin to reach Pedagogy for DNS/DHCP/Monitoring
        # Ports: 53 (DNS), 67-68 (DHCP), 9100 (Node Exporter)
        # One-way rule: Admin initiates only (handled by ct state in return rule)
        ip saddr @cluster_2_admin ip daddr @cluster_1_pedagogy tcp dport { 53, 9100 } ct state new counter accept
        ip saddr @cluster_2_admin ip daddr @cluster_1_pedagogy udp dport { 53, 67, 68 } ct state new counter accept

        # ========== RULE 4: Cluster 2 (Admin) → Cluster 5 (Storage) ==========
        # Allow Admin to reach Storage for iSCSI/NFS
        # Ports: 111 (RPC), 2049 (NFS), 3260 (iSCSI)
        ip saddr @cluster_2_admin ip daddr @cluster_5_storage tcp dport { 111, 2049, 3260 } ct state new counter accept
        ip saddr @cluster_2_admin ip daddr @cluster_5_storage udp dport { 111, 2049 } ct state new counter accept

        # ========== RULE 5: Cluster 2 (Admin) → Cluster 3 (HPC) ==========
        # Allow Admin to reach HPC for SLURM management
        # Ports: 6818-6830 (SLURM)
        # One-way rule: Admin initiates only
        ip saddr @cluster_2_admin ip daddr @cluster_3_hpc tcp dport 6818-6830 ct state new counter accept
        ip saddr @cluster_2_admin ip daddr @cluster_3_hpc udp dport 6818-6830 ct state new counter accept

        # ========== RULE 6: Cluster 1 (Pedagogy) → LMS (VRF-STAFF) ==========
        # Explicit policy for Moodle/LMS access from student networks.
        ip saddr @cluster_1_pedagogy ip daddr @cluster_lms_staff tcp dport { 80, 443 } ct state new counter accept

        # ========== RULE 6B: Cluster 1 (Pedagogy) → CORE-INFRA shared services ==========
        # Student zones may consume DNS and NTP only from the dedicated service IPs.
        ip saddr @cluster_1_pedagogy ip daddr @core_infra_dns tcp dport 53 ct state new counter accept
        ip saddr @cluster_1_pedagogy ip daddr @core_infra_dns udp dport 53 ct state new counter accept
        ip saddr @cluster_1_pedagogy ip daddr @core_infra_ntp udp dport 123 ct state new counter accept
        ip saddr @cluster_1_pedagogy ip daddr @core_infra_dhcp udp dport { 67, 68 } ct state new counter accept
        ip saddr @cluster_1_pedagogy ip daddr @core_infra_syslog tcp dport 514 ct state new counter accept
        ip saddr @cluster_1_pedagogy ip daddr @cluster_public_dmz tcp dport 80 ct state new counter accept
        ip saddr @cluster_1_pedagogy ip daddr 192.168.70.30 tcp dport 8080 ct state new counter accept

        # ========== RULE 6B.1: Protected servers → TACACS+ directory gateway ==========
        ip saddr @tacacs_auth_clients ip daddr @core_infra_auth tcp dport 49 ct state new counter accept

        # ========== RULE 6C: Campus edge → CORE-INFRA shared services ==========
        # Campus access remains narrow and still crosses Ring 1.
        ip saddr @cluster_campus_access ip daddr @core_infra_dns tcp dport 53 ct state new counter accept
        ip saddr @cluster_campus_access ip daddr @core_infra_dns udp dport 53 ct state new counter accept
        ip saddr @cluster_campus_access ip daddr @core_infra_ntp udp dport 123 ct state new counter accept
        ip saddr @cluster_campus_access ip daddr @core_infra_dhcp udp dport { 67, 68 } ct state new counter accept
        ip saddr @cluster_campus_access ip daddr @core_infra_syslog tcp dport 514 ct state new counter accept
        ip saddr @cluster_campus_access ip daddr @cluster_public_dmz tcp dport 80 ct state new counter accept
        ip saddr @cluster_campus_access ip daddr @internet_public_web tcp dport { 80, 443 } ct state new counter accept
        ip saddr @cluster_campus_access ip daddr @internet_public_web icmp type echo-request ct state new counter accept
        ip saddr @cluster_campus_access ip daddr 192.168.70.30 tcp dport 8080 ct state new counter accept
        ip saddr @cluster_campus_access ip daddr @campus_ssh_targets tcp dport 22 ct state new counter accept
        ip saddr @campus_nac_gateway ip daddr @core_infra_auth udp dport 1812 ct state new counter accept
        ip saddr @vpn_gateway ip daddr @core_infra_auth udp dport 1812 ct state new counter accept
        ip saddr @vpn_gateway ip daddr @core_infra_dns tcp dport 53 ct state new counter accept
        ip saddr @vpn_gateway ip daddr @core_infra_dns udp dport 53 ct state new counter accept
        ip saddr @vpn_gateway ip daddr @moodle_frontend tcp dport { 80, 443, 8443 } ct state new counter accept
        ip saddr @vpn_gateway ip daddr @vpn_student_ssh_targets tcp dport 22 ct state new counter accept
        ip saddr @vpn_gateway ip daddr 192.168.70.30 tcp dport 8080 ct state new counter accept
        ip saddr @cluster_campus_access ip daddr @core_infra_auth tcp dport { 49, 389, 8080 } counter drop

        # ========== RULE 6D: DMZ → CORE-INFRA centralized logging ==========
        # DMZ remains isolated except for one-way TCP syslog export to the collector.
        ip saddr @cluster_public_dmz ip daddr @core_infra_syslog tcp dport 514 ct state new counter accept

        # ========== RULE 6E: Moodle frontend → storage-backed MariaDB ==========
        # Keep the DB inside the storage pod while preserving DMZ isolation with a
        # single application-specific flow.
        ip saddr @moodle_frontend ip daddr @moodle_db_storage tcp dport 3306 ct state new counter accept

        # ========== RULE 7: Isolation - Block Cluster 1 → Cluster 2 ==========
        # Explicitly DROP traffic from Cluster 1 attempting to reach Admin
        # This prevents reverse traffic from Pedagogy back to Admin
        ip saddr @cluster_1_pedagogy ip daddr @cluster_2_admin counter drop

        # ========== RULE 8: Orientation Isolation - Cluster 4 ==========
        # Explicitly DROP all traffic to/from VRF-ORIENTATION (Cluster 4)
        ip saddr @cluster_4_orientation counter drop
        ip daddr @cluster_4_orientation counter drop

        # ========== RULE 9: DMZ isolation (VRF-PUBLIC) ==========
        # DMZ is internet-facing only and must not route to internal clusters.
        ip saddr @cluster_public_dmz ip daddr @cluster_1_pedagogy counter drop
        ip saddr @cluster_public_dmz ip daddr @cluster_2_admin counter drop
        ip saddr @cluster_public_dmz ip daddr @cluster_3_hpc counter drop
        ip saddr @cluster_public_dmz ip daddr @cluster_5_storage counter drop
        ip saddr @cluster_1_pedagogy ip daddr @cluster_public_dmz counter drop
        ip saddr @cluster_2_admin ip daddr @cluster_public_dmz counter drop
        ip saddr @cluster_3_hpc ip daddr @cluster_public_dmz counter drop
        ip saddr @cluster_5_storage ip daddr @cluster_public_dmz counter drop

        # ========== NOTE: RULE 10 - Hairpinning ==========
        # No rules needed for Cluster 3 ↔ Cluster 5 (same VRF, hairpinning)
        # These packets will follow spine/leaf routing and bypass this firewall

        # Drop all other traffic
        counter drop
    }

    # ============================================================================
    # OUTPUT CHAIN - Traffic originating from the firewall
    # ============================================================================
    chain output {
        type filter hook output priority 0; policy accept;
    }
}
