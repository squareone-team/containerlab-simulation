        - configs/ntp-server/server-client-ntp.sh:/ntp-client.sh
      exec:
        - sh /startup.sh
        - sh /ntp-client.sh

    moodle-db:
      kind: linux
      image: bitnamilegacy/mariadb:11.4
      user: root
      cap-add:
        - NET_ADMIN
        - NET_RAW
      env:
        MARIADB_ROOT_PASSWORD: "MoodleRootDb#2026"
        MARIADB_DATABASE: moodle
        MARIADB_USER: moodle_app
        MARIADB_PASSWORD: "MoodleAppDb#2026"
        MARIADB_CHARACTER_SET: utf8mb4
        MARIADB_COLLATE: utf8mb4_unicode_ci
      exec:
        - sh -lc "command -v ip >/dev/null 2>&1 || install_packages iproute2
          >/tmp/iproute2-install.log 2>&1"
        - sh -lc "ip link add bond0 type bond mode active-backup miimon 100
          primary eth1 2>/dev/null || true; ip addr flush dev eth1 2>/dev/null
          || true; ip addr flush dev eth2 2>/dev/null || true; ip link set eth1
          down 2>/dev/null || true; ip link set eth2 down 2>/dev/null || true;
          ip link set eth1 master bond0 2>/dev/null || true; ip link set eth2
          master bond0 2>/dev/null || true; ip link set eth1 up; ip link set
          eth2 up; ip link set bond0 up; ip addr replace 192.168.80.31/24 dev
          bond0; ip route del default 2>/dev/null || true; ip route add default
          via 192.168.80.1 dev bond0 || true"

    moodle:
      kind: linux
      image: bitnamilegacy/moodle:5.0.2
      user: root
      startup-delay: 10
      cap-add:
        - NET_ADMIN
        - NET_RAW
      env:
        MOODLE_DATABASE_TYPE: mariadb
        MOODLE_DATABASE_HOST: "192.168.80.31"
        MOODLE_DATABASE_PORT_NUMBER: "3306"
        MOODLE_DATABASE_NAME: moodle
        MOODLE_DATABASE_USER: moodle_app
        MOODLE_DATABASE_PASSWORD: "MoodleAppDb#2026"
        MOODLE_USERNAME: squareone.admin
        MOODLE_PASSWORD: "SquareOneMoodle#2026"
        MOODLE_EMAIL: "squareone.admin@esi.dz"
        MOODLE_SITE_NAME: "ESI Moodle TP"
        MOODLE_HOST: "moodle.esi.dz"
        APACHE_HTTP_PORT_NUMBER: "80"
        APACHE_HTTPS_PORT_NUMBER: "8443"
      binds:
        - configs/moodle/bootstrap.sh:/opt/esi-moodle/bootstrap.sh:ro
        - configs/moodle/seed-esi-course.php:/opt/esi-moodle/seed-esi-course.php:ro
      exec:
        - sh -lc "command -v ip >/dev/null 2>&1 || install_packages iproute2
          >/tmp/iproute2-install.log 2>&1"
        - sh -lc "ip link set eth1 up && ip addr replace 198.51.100.30/24
          dev eth1 && ip route del default 2>/dev/null || true; ip route add
          default via 198.51.100.1 dev eth1 || true"
        - sh -lc "nohup sh /opt/esi-moodle/bootstrap.sh
          >/tmp/esi-moodle-bootstrap.log 2>&1 &"

    firewall-01:
      kind: linux
      image: esi/alpine-firewall:3.20
      mgmt-ipv4: 172.20.20.101
      binds:
        - configs/firewall-common/startup-common.sh:/opt/firewall-common/startup-common.sh
