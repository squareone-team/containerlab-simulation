    internet-router-01:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/internet-router-01/daemons:/etc/frr/daemons
        - configs/internet-router-01/frr.conf:/etc/frr/frr.conf

    internet-router-02:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/internet-router-02/daemons:/etc/frr/daemons
        - configs/internet-router-02/frr.conf:/etc/frr/frr.conf

    internet-client-01:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 198.18.1.10/24 dev eth1
        - ip route del default
        - ip route add default via 198.18.1.1 dev eth1

    internet-client-02:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 198.18.2.10/24 dev eth1
        - ip route del default
        - ip route add default via 198.18.2.1 dev eth1

    internet-web-01:
      kind: linux
      image: python:3.11-alpine
      cmd: sleep infinity
      binds:
        - ./configs/internet-web-01/www:/www:ro
      exec:
        - sh -c "ip addr add 198.18.3.10/24 dev eth1 && ip link set eth1 up && nohup python3 -m http.server 80 --bind 198.18.3.10 --directory /www >/tmp/http-server.log 2>&1 &"
        - ip route del default
        - ip route add default via 198.18.3.1 dev eth1

    server-student-01:
      kind: linux
      image: alpine:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-student-01/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    server-student-02:
      kind: linux
      image: alpine:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-student-02/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    server-admin-01:
      kind: linux
      image: alpine:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-admin-01/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    server-admin-02:
      kind: linux
      image: alpine:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-admin-02/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    server-hpc-01:
      kind: linux
      image: alpine:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-hpc-01/startup.sh:/startup.sh
      exec:
        - sh /startup.sh # <--- Utilise "exec" pour que le serveur reste UP

    server-hpc-02:
      kind: linux
      image: alpine:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-hpc-02/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    server-storage-01:
      kind: linux
      image: alpine:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-storage-01/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    server-dmz-01:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 198.51.100.10/24 dev eth1
        - ip route del default
        - ip route add default via 198.51.100.1 dev eth1

    lms-staff:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 192.168.30.10/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.30.1 dev eth1

    services-web:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 192.168.40.10/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.40.1 dev eth1

    firewall-01:
      kind: linux
      image: alpine:3.20
      mgmt-ipv4: 172.20.20.101
      binds:
        - configs/firewall-common/startup-common.sh:/opt/firewall-common/startup-common.sh
        - configs/firewall-01/keepalived.conf:/etc/keepalived/keepalived.conf
        - configs/firewall-01/nftables.conf:/etc/nftables.conf
        - configs/firewall-01/startup.sh:/startup.sh
      exec:
        - sh /startup.sh
    firewall-02:
      kind: linux
      image: alpine:3.20
      mgmt-ipv4: 172.20.20.102
      binds:
        - configs/firewall-common/startup-common.sh:/opt/firewall-common/startup-common.sh
        - configs/firewall-02/keepalived.conf:/etc/keepalived/keepalived.conf
        - configs/firewall-02/nftables.conf:/etc/nftables.conf
        - configs/firewall-02/startup.sh:/startup.sh
      exec:
        - sh /startup.sh
    bastion-01:
      kind: linux
      image: alpine:3.16
      binds:
        - configs/bastion-01/startup.sh:/startup.sh
      exec:
        - sh /startup.sh
    ids-01:
      kind: linux
      image: alpine:3.20
    ntp-server:
      kind: linux
      image: alpine:3.20
    dns-server:
      kind: linux
      image: alpine:3.20
    dhcp-server:
      kind: linux
      image: alpine:3.20
    ftp-server:
      kind: linux
      image: alpine:3.20
    zabbix-server:
      kind: linux
      image: alpine:3.20
    prometheus:
      kind: linux
      image: prom/prometheus:latest
      ports:
        - 9090:9090
      binds:
        - configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        - configs/prometheus/alerts.yml:/etc/prometheus/alerts.yml
    grafana:
      kind: linux
      image: grafana/grafana:latest
      ports:
        - 3000:3000
      env:
        GF_SECURITY_ADMIN_USER: admin
        GF_SECURITY_ADMIN_PASSWORD: admin
        GF_USERS_ALLOW_SIGN_UP: "false"
        GF_METRICS_ENABLED: "true"
        GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/esi-fabric-observability.json
      binds:
        - configs/grafana/provisioning:/etc/grafana/provisioning
    frr-exporter:
      kind: linux
      image: alpine:3.20
      env:
        LAB_NAME: esi-datacenter
      binds:
        - configs/frr-exporter/metrics:/srv/www/metrics
        - configs/frr-exporter/generate-metrics.sh:/opt/frr-exporter/generate-metrics.sh
        - /var/run/docker.sock:/var/run/docker.sock
      exec:
        - sh -lc "apk add --no-cache busybox-extras docker-cli jq iproute2 >/dev/null 2>&1 || true;
          chmod +x /opt/frr-exporter/generate-metrics.sh;
          nohup /opt/frr-exporter/generate-metrics.sh >/tmp/frr-exporter-loop.log 2>&1
          &
          nohup httpd -f -p 9342 -h /srv/www >/tmp/frr-exporter-httpd.log 2>&1
          &"
    syslog-server:
      kind: linux
      image: alpine:3.20
    wifi-controller:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 192.168.10.100/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.10.1 dev eth1
    campus-bp:
      kind: linux
      image: alpine:3.20
      exec:
        - sh -lc 'ip link add br-student type bridge 2>/dev/null || true; ip link set br-student up || true; ip addr add 192.168.10.1/24 dev br-student 2>/dev/null || true'
        - sh -lc 'apk add --no-cache iptables >/dev/null 2>&1 || true; for i in $(seq 1 20); do ip link show eth1 >/dev/null 2>&1 && break; sleep 1; done; ip link set eth1 up 2>/dev/null || true; ip addr add 100.10.0.2/30 dev eth1 2>/dev/null || true; ip route del default 2>/dev/null || true; ip route add default via 100.10.0.1 dev eth1 2>/dev/null || true; sysctl -w net.ipv4.ip_forward=1 >/dev/null 2>&1 || true; iptables -t nat -C POSTROUTING -s 192.168.10.0/24 -o eth1 -j MASQUERADE 2>/dev/null || iptables -t nat -A POSTROUTING -s 192.168.10.0/24 -o eth1 -j MASQUERADE'
        - sh -lc 'for i in $(seq 1 20); do ip link show eth3 >/dev/null 2>&1 &&
          break; sleep 1; done; ip link set eth3 up 2>/dev/null || true; ip addr
          add 10.200.0.2/30 dev eth3 2>/dev/null || true; ip route del
          192.168.10.100/32 2>/dev/null || true; ip route add 192.168.10.100/32
          via 10.200.0.1 2>/dev/null || true'
        - sh -lc 'for i in $(seq 1 20); do ip link show eth4 >/dev/null 2>&1 &&
          break; sleep 1; done; ip link set eth4 up 2>/dev/null || true; ip link
          set eth4 master br-student 2>/dev/null || true'

    student-bp-01:
      kind: linux
      image: nicolaka/netshoot
      cmd: sleep infinity
      exec:
        - ip addr add 192.168.10.30/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.10.1 dev eth1
    oob-sw:
      kind: linux
      image: alpine:3.20
      binds:
        - configs/oob-sw/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

