    isp-router-01:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/isp-router-01/daemons:/etc/frr/daemons
        - configs/isp-router-01/frr.conf:/etc/frr/frr.conf
        - configs/isp-router-01/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    isp-router-02:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/isp-router-02/daemons:/etc/frr/daemons
        - configs/isp-router-02/frr.conf:/etc/frr/frr.conf
        - configs/isp-router-02/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    isp-router-03:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/isp-router-03/daemons:/etc/frr/daemons
        - configs/isp-router-03/frr.conf:/etc/frr/frr.conf
        - configs/isp-router-03/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    isp-router-04:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/isp-router-04/daemons:/etc/frr/daemons
        - configs/isp-router-04/frr.conf:/etc/frr/frr.conf

    internet-router-01:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/internet-router-01/daemons:/etc/frr/daemons
        - configs/internet-router-01/frr.conf:/etc/frr/frr.conf

    internet-router-02:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/internet-router-02/daemons:/etc/frr/daemons
        - configs/internet-router-02/frr.conf:/etc/frr/frr.conf

    internet-client-01:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 198.18.1.10/24 dev eth1
        - ip route del default
        - ip route add default via 198.18.1.1 dev eth1

    internet-client-02:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 198.18.2.10/24 dev eth1
        - ip route del default
        - ip route add default via 198.18.2.1 dev eth1

    internet-web-01:
      kind: linux
      image: python:3.11-alpine
      cmd: sleep infinity
      binds:
        - ./configs/internet-web-01/www:/www:ro
      exec:
        - sh -c "ip addr add 198.18.3.10/24 dev eth1 && ip link set eth1 up &&
          nohup python3 -m http.server 80 --bind 198.18.3.10 --directory /www
          >/tmp/http-server.log 2>&1 &"
        - ip route del default
        - ip route add default via 198.18.3.1 dev eth1

    server-student-01:
      kind: linux
      image: esi/alpine-host:3.20
      mgmt-ipv4: 172.20.20.25
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-student-01/startup.sh:/startup.sh
        - configs/ntp-server/server-client-ntp.sh:/ntp-client.sh
      exec:
        - sh /startup.sh
        - sh /ntp-client.sh

    server-student-02:
      kind: linux
      image: esi/alpine-host:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-student-02/startup.sh:/startup.sh
        - configs/ntp-server/server-client-ntp.sh:/ntp-client.sh
      exec:
        - sh /startup.sh
        - sh /ntp-client.sh

    server-admin-01:
      kind: linux
      image: esi/alpine-host:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-admin-01/startup.sh:/startup.sh
        - configs/ntp-server/server-client-ntp.sh:/ntp-client.sh
      exec:
        - sh /startup.sh
        - sh /ntp-client.sh

    server-admin-02:
      kind: linux
      image: esi/alpine-host:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-admin-02/startup.sh:/startup.sh
        - configs/ntp-server/server-client-ntp.sh:/ntp-client.sh
      exec:
        - sh /startup.sh
        - sh /ntp-client.sh

    server-hpc-01:
      kind: linux
      image: esi/alpine-host:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-hpc-01/startup.sh:/startup.sh
        - configs/ntp-server/server-client-ntp.sh:/ntp-client.sh
      exec:
        - sh /startup.sh # <--- Utilise "exec" pour que le serveur reste UP
        - sh /ntp-client.sh

    server-hpc-02:
      kind: linux
      image: esi/alpine-host:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-hpc-02/startup.sh:/startup.sh
        - configs/ntp-server/server-client-ntp.sh:/ntp-client.sh
      exec:
        - sh /startup.sh
        - sh /ntp-client.sh

    server-storage-01:
      kind: linux
      image: esi/alpine-host:3.20
      cap-add:
        - NET_ADMIN
        - SYS_MODULE
        - NET_RAW
      binds:
        - configs/server-storage-01/startup.sh:/startup.sh
        - configs/ntp-server/server-client-ntp.sh:/ntp-client.sh
      exec:
        - sh /startup.sh
        - sh /ntp-client.sh

    server-dmz-01:
      kind: linux
      image: esi/alpine-host:3.20
      binds:
        - configs/server-dmz-01/startup.sh:/startup.sh
        - configs/server-dmz-01/www:/www:ro
        - configs/ntp-server/server-client-ntp.sh:/ntp-client.sh
      exec:
        - sh /startup.sh
        - sh /ntp-client.sh

    lms-staff:
      kind: linux
      image: esi/alpine-host:3.20
      binds:
        - configs/ntp-server/server-client-ntp.sh:/ntp-client.sh
      exec:
        - ip addr add 192.168.30.10/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.30.1 dev eth1
        - sh /ntp-client.sh

    services-web:
      kind: linux
      image: esi/alpine-host:3.20
      binds:
        - configs/ntp-server/server-client-ntp.sh:/ntp-client.sh
      exec:
        - ip addr add 192.168.40.10/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.40.1 dev eth1
        - sh /ntp-client.sh

    firewall-01:
      kind: linux
      image: esi/alpine-firewall:3.20
      mgmt-ipv4: 172.20.20.101
      binds:
        - configs/firewall-common/startup-common.sh:/opt/firewall-common/startup-common.sh
        - configs/firewall-01/keepalived.conf:/etc/keepalived/keepalived.conf
        - configs/firewall-01/nftables.conf:/etc/nftables.conf
        - configs/firewall-01/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    firewall-02:
      kind: linux
      image: esi/alpine-firewall:3.20
      mgmt-ipv4: 172.20.20.102
      binds:
        - configs/firewall-common/startup-common.sh:/opt/firewall-common/startup-common.sh
        - configs/firewall-02/keepalived.conf:/etc/keepalived/keepalived.conf
        - configs/firewall-02/nftables.conf:/etc/nftables.conf
        - configs/firewall-02/startup.sh:/startup.sh
      exec:
        - sh /startup.sh
    bastion-01:
      kind: linux
      image: esi/alpine-host:3.20
      binds:
        - configs/bastion-01/startup.sh:/startup.sh
        - configs/shared:/shared
      exec:
        - sh /startup.sh
    ids-01:
      kind: linux
      image: alpine:3.20
    ntp-server:
      kind: linux
      image: esi/alpine-host:3.20
      binds:
        - configs/ntp-server/startup.sh:/startup.sh
      cmd: sh /startup.sh

    dns-server:
      kind: linux
      image: esi/alpine-services:3.20
      binds:
        - configs/dns-server/startup.sh:/setup.sh:ro
        - configs/dns-server/unbound.conf:/etc/unbound/unbound.conf.seed:ro
      cmd: /bin/sh /setup.sh

    dhcp-server:
      kind: linux
      image: esi/alpine-services:3.20
      binds:
        - configs/dhcp-server/startup.sh:/startup.sh
      cmd: sh /startup.sh
      cap-add:
        - NET_ADMIN
        - NET_RAW

    ftp-server:
      kind: linux
      image: esi/alpine-host:3.20
      binds:
        - configs/ftp-server/startup.sh:/startup.sh
        - configs/shared:/shared:ro
      exec:
        - sh /startup.sh
    zabbix-server:
      kind: linux
      image: esi/alpine-zabbix:3.20
      startup-delay: 60
      binds:
        - configs/zabbix-server/startup.sh:/startup.sh
      cmd: sh /startup.sh
      cap-add:
        - NET_ADMIN
        - NET_RAW

    prometheus:
      kind: linux
      image: prom/prometheus:latest
      ports:
        - 9090:9090
      binds:
        - configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        - configs/prometheus/alerts.yml:/etc/prometheus/alerts.yml
    grafana:
      kind: linux
      image: grafana/grafana:latest
      ports:
        - 3000:3000
      env:
        GF_SECURITY_ADMIN_USER: admin
        GF_SECURITY_ADMIN_PASSWORD: admin
        GF_USERS_ALLOW_SIGN_UP: "false"
        GF_METRICS_ENABLED: "true"
        GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/esi-fabric-observability.json
      binds:
        - configs/grafana/provisioning:/etc/grafana/provisioning
    frr-exporter:
      kind: linux
      image: esi/alpine-exporter:3.20
      env:
        LAB_NAME: esi-datacenter
      binds:
        - configs/frr-exporter/metrics:/srv/www/metrics
        - configs/frr-exporter/generate-metrics.sh:/opt/frr-exporter/generate-metrics.sh
        - /var/run/docker.sock:/var/run/docker.sock
      exec:
        - sh -lc "chmod +x /opt/frr-exporter/generate-metrics.sh; nohup
          /opt/frr-exporter/generate-metrics.sh >/tmp/frr-exporter-loop.log 2>&1
          & nohup httpd -f -p 9342 -h /srv/www >/tmp/frr-exporter-httpd.log 2>&1
          &"
    syslog-server:
      kind: linux
      image: esi/alpine-host:3.20
      binds:
        - configs/syslog-server/startup.sh:/startup.sh
        - configs/shared:/shared:ro
      exec:
        - sh /startup.sh
    wifi-controller:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 192.168.10.100/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.10.1 dev eth1
    campus-bp:
      kind: linux
      image: esi/alpine-host:3.20
      binds:
        - configs/campus-bp/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    student-bp-01:
      kind: linux
      image: nicolaka/netshoot
      binds:
        - configs/student-bp-01/startup.sh:/startup.sh
      cmd: sleep infinity
      exec:
        - sh /startup.sh
    oob-sw:
      kind: linux
      image: alpine:3.20
      binds:
        - configs/oob-sw/startup.sh:/startup.sh
      exec:
        - sh /startup.sh
    tacacs-server:
      kind: linux
      image: dchidell/docker-tacacs
      mgmt-ipv4: 172.20.20.50
      binds:
        - configs/tacacs-server/tac_plus.conf:/etc/tac_plus/tac_user.cfg  # ← changer le chemin destination
        - configs/tacacs-server/startup.sh:/startup.sh
      exec:
        - sh /startup.sh
    openldap-server:
      kind: linux
      image: osixia/openldap:1.5.0
      mgmt-ipv4: 172.20.20.51
      env:
        LDAP_ORGANISATION: "ESI Datacenter"
        LDAP_DOMAIN: "esi.dz"
        LDAP_ADMIN_PASSWORD: "ESI@Admin2024"
        LDAP_CONFIG_PASSWORD: "ESI@Config2024"
      binds:
        - configs/openldap-server/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    phpldapadmin:
      kind: linux
      image: osixia/phpldapadmin:latest
      ports:
        - 8080:80
      env:
        PHPLDAPADMIN_LDAP_HOSTS: openldap-server

