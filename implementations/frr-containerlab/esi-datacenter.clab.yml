      binds:
        - configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        - configs/prometheus/alerts.yml:/etc/prometheus/alerts.yml
    grafana:
      kind: linux
      image: grafana/grafana:latest
      ports:
        - 3000:3000
      env:
        GF_SECURITY_ADMIN_USER: squareone.admin
        GF_SECURITY_ADMIN_PASSWORD: "SquareOneGrafana#2026"
        GF_USERS_ALLOW_SIGN_UP: "false"
        GF_METRICS_ENABLED: "true"
        GF_ANALYTICS_REPORTING_ENABLED: "false"
        GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
        GF_PLUGINS_PLUGIN_ADMIN_ENABLED: "false"
        GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/esi-fabric-observability.json
      binds:
        - configs/grafana/provisioning:/etc/grafana/provisioning
    fabric-telemetry:
      kind: linux
      image: esi/alpine-exporter:3.20
      env:
        LAB_NAME: esi-datacenter
      binds:
        - configs/fabric-telemetry/metrics:/srv/www/metrics
        - configs/fabric-telemetry/generate-metrics.sh:/opt/fabric-telemetry/generate-metrics.sh
        - /var/run/docker.sock:/var/run/docker.sock
      exec:
        - sh -lc "chmod +x /opt/fabric-telemetry/generate-metrics.sh; nohup
          /opt/fabric-telemetry/generate-metrics.sh
          >/tmp/fabric-telemetry-loop.log 2>&1 & nohup httpd -f -p 9342 -h
          /srv/www >/tmp/fabric-telemetry-httpd.log 2>&1 &"
    syslog-server:
      kind: linux
      image: esi/alpine-host:3.20
      binds:
        - configs/syslog-server/startup.sh:/startup.sh
        - configs/shared:/shared:ro
      exec:
        - sh /startup.sh
    wifi-controller:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 192.168.10.100/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.10.1 dev eth1
    campus-bp:
      kind: linux
      image: esi/alpine-host:3.20
      binds:
        - configs/campus-bp/startup.sh:/startup.sh
        - configs/campus-bp/nftables.conf:/etc/nftables.conf:ro
        - configs/campus-bp/esi-nac-server.py:/usr/local/bin/esi-nac-server.py:ro
        - ../../.codex/logo_esi.png:/opt/esi/logo_esi.png:ro
      exec:
        - sh /startup.sh

    guest-01:
      kind: linux
      image: esi/fabric-browser:3.23
      cap-add:
        - NET_ADMIN
        - NET_RAW
        - SYS_MODULE
      binds:
        - configs/guest-01/startup.sh:/startup.sh
      env:
        FF_OPEN_URL: "https://192.168.110.1:8443/"
      ports:
        - 127.0.0.1:5813:5800
      exec:
        - sh /startup.sh

    student-01:
      kind: linux
      image: esi/fabric-browser:3.23
      cap-add:
        - NET_ADMIN
        - NET_RAW
        - SYS_MODULE
      env:
        FF_OPEN_URL: "https://192.168.110.1:8443/"
      ports:
        - 127.0.0.1:5811:5800
      binds:
        - configs/student-01/startup.sh:/startup.sh
        - configs/common/esi-nac-client.py:/usr/local/bin/esi-nac-client.py:ro
      exec:
        - sh /startup.sh

    admin-01:
      kind: linux
      image: esi/fabric-browser:3.23
      cap-add:
        - NET_ADMIN
        - NET_RAW
        - SYS_MODULE
      env:
        FF_OPEN_URL: "https://192.168.110.1:8443/"
      ports:
        - 127.0.0.1:5812:5800
      binds:
        - configs/admin-01/startup.sh:/startup.sh
        - configs/common/esi-nac-client.py:/usr/local/bin/esi-nac-client.py:ro
      exec:
        - sh /startup.sh

    oob-sw:
      kind: linux
      image: alpine:3.20
      binds:
        - configs/oob-sw/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

    auth-server:
      kind: linux
      image: esi/auth-server:3.20
      cmd: sleep infinity
      binds:
        - configs/auth-server/startup.sh:/startup.sh
      exec:
        - sh /startup.sh

