name: esi-browser-viewers

topology:
  nodes:
    campus-guest-browser:
      kind: linux
      image: jlesage/firefox:latest
      network-mode: container:clab-esi-datacenter-student-bp-01
      env:
        FF_OPEN_URL: "https://192.168.110.1:8443/"
      exec:
        - sh -lc "{ echo 'search esi.internal'; echo 'nameserver 192.168.50.30'; } > /etc/resolv.conf"

    campus-student-browser:
      kind: linux
      image: jlesage/firefox:latest
      network-mode: container:clab-esi-datacenter-campus-student-01
      env:
        FF_OPEN_URL: "http://moodle.esi.dz/"
      exec:
        - sh -lc "{ echo 'search esi.internal'; echo 'nameserver 192.168.50.30'; } > /etc/resolv.conf"

    campus-admin-browser:
      kind: linux
      image: jlesage/firefox:latest
      network-mode: container:clab-esi-datacenter-campus-admin-01
      env:
        FF_OPEN_URL: "https://hpc-jupyter.esi.internal:8080/hub/login"
      exec:
        - sh -lc "{ echo 'search esi.internal'; echo 'nameserver 192.168.50.30'; } > /etc/resolv.conf"

    vpn-browser-01:
      kind: linux
      image: jlesage/firefox:latest
      network-mode: container:clab-esi-datacenter-vpn-client-01
      env:
        FF_OPEN_URL: "https://198.51.100.20:8448/"
      exec:
        - sh -lc "echo 'nameserver 1.1.1.1' > /etc/resolv.conf"
