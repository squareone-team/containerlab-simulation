---
# ansible/playbooks/push_leaf_config.yml
# Pushes interface + VLAN + BGP config to all leafs using variables from inventory.
# Run: ansible-playbook playbooks/push_leaf_config.yml --limit leafs

- name: Configure leaf switches
  hosts: leafs
  gather_facts: false

  tasks:
    - name: Configure hostname and IP routing
      arista.eos.eos_config:
        lines:
          - hostname {{ inventory_hostname }}
        parents: []

    - name: Enable IP routing
      arista.eos.eos_config:
        lines:
          - ip routing

    - name: Configure access VLAN on Ethernet3 (if host_vlan defined)
      arista.eos.eos_config:
        lines:
          - switchport access vlan {{ host_vlan }}
          - no shutdown
        parents: interface Ethernet3
      when: host_vlan is defined

    - name: Configure SVI gateway (if host_gw defined)
      arista.eos.eos_config:
        lines:
          - ip address {{ host_gw }}
          - no shutdown
        parents: "interface Vlan{{ host_vlan }}"
      when: host_vlan is defined and host_gw is defined

    - name: Save running config
      arista.eos.eos_command:
        commands:
          - write memory