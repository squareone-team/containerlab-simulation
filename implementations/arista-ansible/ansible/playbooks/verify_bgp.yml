---
- name: Verify BGP fabric health
  hosts: fabric
  gather_facts: false

  tasks:
    - name: Collect BGP summary
      arista.eos.eos_command:
        commands:
          - show bgp summary | json
      register: bgp_raw

    - name: Parse neighbor states
      set_fact:
        bgp_neighbors: >-
          {{ bgp_raw.stdout[0].vrfs.default.peers
             if bgp_raw.stdout[0] is mapping
             else (bgp_raw.stdout[0] | from_json).vrfs.default.peers }}

    - name: Print BGP neighbor table
      debug:
        msg: >-
          {{ inventory_hostname }} BGP peers:
          {% for peer, info in bgp_neighbors.items() %}
          {{ peer }} -> {{ info.peerState }} (prefixes: {{ info.prefixReceived | default(0) }})
          {% endfor %}

    - name: Assert all peers are Established
      assert:
        that: >-
          bgp_neighbors.values() | map(attribute='peerState') | list | unique == ['Established']
        fail_msg: "{{ inventory_hostname }} has BGP peers NOT in Established state!"
        success_msg: "{{ inventory_hostname }} — all BGP sessions Established"