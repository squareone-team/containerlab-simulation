[defaults]
inventory            = hosts.yml
roles_path           = roles
collections_path     = collections:/usr/share/ansible/collections:~/.ansible/collections
host_key_checking    = False
timeout              = 60
forks                = 10
stdout_callback      = yaml
deprecation_warnings = False
system_warnings      = False
interpreter_python   = auto_silent

[persistent_connection]
connect_timeout = 60
command_timeout = 60
ssh_type = libssh

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o LogLevel=ERROR

[paramiko_connection]
look_for_keys = False
