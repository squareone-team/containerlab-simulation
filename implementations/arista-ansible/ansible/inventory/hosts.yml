---
all:
  vars:
    # =========================
    # EOS CONNECTION (FIXED)
    # =========================
    ansible_user: admin
    ansible_password: admin

    ansible_connection: ansible.netcommon.httpapi
    ansible_network_os: arista.eos.eos

    ansible_httpapi_use_ssl: true
    ansible_httpapi_port: 443
    ansible_httpapi_validate_certs: false

    # IMPORTANT: enable mode fix
    ansible_become: true
    ansible_become_method: enable

  children:

    # =========================
    # FABRIC GROUP
    # =========================
    fabric:
      children:
        spines:
        leaves:

    # =========================
    # SPINES
    # =========================
    spines:
      vars:
        pod_role: spine
        bgp_as: 65000

      hosts:
        spine-01:
          ansible_host: 172.20.20.11
          router_id: 10.0.0.1
          loopback0: 10.0.0.1/32

        spine-02:
          ansible_host: 172.20.20.12
          router_id: 10.0.0.2
          loopback0: 10.0.0.2/32

    # =========================
    # LEAVES (ALL PODS)
    # =========================
    leaves:
      children:
        pod_edge:
        pod_core:
        pod_storage:
        pod_compute:
        pod_ultra:

    # =========================
    # POD EDGE
    # =========================
    pod_edge:
      vars:
        pod_name: edge
        pod_id: 1
        vrf_list: [PUBLIC, CAMPUS]

      hosts:
        leaf-01:
          ansible_host: 172.20.20.21
          router_id: 10.0.1.1
          loopback0: 10.0.1.1/32
          bgp_as: 65101

        leaf-02:
          ansible_host: 172.20.20.22
          router_id: 10.0.1.2
          loopback0: 10.0.1.2/32
          bgp_as: 65102

    # =========================
    # POD CORE
    # =========================
    pod_core:
      vars:
        pod_name: core
        pod_id: 2
        vrf_list: [ADMIN, INFRA]

      hosts:
        leaf-03:
          ansible_host: 172.20.20.23
          router_id: 10.0.2.1
          loopback0: 10.0.2.1/32
          bgp_as: 65103

        leaf-04:
          ansible_host: 172.20.20.24
          router_id: 10.0.2.2
          loopback0: 10.0.2.2/32
          bgp_as: 65104

    # =========================
    # POD STORAGE
    # =========================
    pod_storage:
      vars:
        pod_name: storage
        pod_id: 3
        vrf_list: [STORAGE]

      hosts:
        leaf-05:
          ansible_host: 172.20.20.25
          router_id: 10.0.3.1
          loopback0: 10.0.3.1/32
          bgp_as: 65105

        leaf-06:
          ansible_host: 172.20.20.26
          router_id: 10.0.3.2
          loopback0: 10.0.3.2/32
          bgp_as: 65106

    # =========================
    # POD COMPUTE
    # =========================
    pod_compute:
      vars:
        pod_name: compute
        pod_id: 4
        vrf_list: [TENANT_A, TENANT_B]

      hosts:
        leaf-07:
          ansible_host: 172.20.20.27
          router_id: 10.0.4.1
          loopback0: 10.0.4.1/32
          bgp_as: 65107

        leaf-08:
          ansible_host: 172.20.20.28
          router_id: 10.0.4.2
          loopback0: 10.0.4.2/32
          bgp_as: 65108

    # =========================
    # POD ULTRA
    # =========================
    pod_ultra:
      vars:
        pod_name: ultra
        pod_id: 5
        vrf_list: [HPC, STUDENT]

      hosts:
        leaf-09:
          ansible_host: 172.20.20.29
          router_id: 10.0.5.1
          loopback0: 10.0.5.1/32
          bgp_as: 65109

        leaf-10:
          ansible_host: 172.20.20.30
          router_id: 10.0.5.2
          loopback0: 10.0.5.2/32
          bgp_as: 65110