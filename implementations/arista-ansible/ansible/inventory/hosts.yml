---
# =============================================================================
# ESI Data Center — Ansible Inventory
# Containerlab management network: 172.20.20.0/24
# Transport: network_cli / EOS API (eAPI disabled in cEOS by default → SSH)
# =============================================================================

all:
  vars:
    ansible_user: admin
    ansible_password: admin
    ansible_become: false
    ansible_network_os: arista.eos.eos
    ansible_connection: network_cli
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

  children:

    # -------------------------------------------------------------------------
    # FABRIC — all Arista cEOS nodes (spines + leaves)
    # -------------------------------------------------------------------------
    fabric:
      children:
        spines:
        leaves:

    spines:
      vars:
        pod_role: spine
        bgp_as: 65000
      hosts:
        spine-01:
          ansible_host: 172.20.20.11
          router_id: 10.0.0.1
          loopback0: 10.0.0.1/32
        spine-02:
          ansible_host: 172.20.20.12
          router_id: 10.0.0.2
          loopback0: 10.0.0.2/32

    leaves:
      children:
        pod_edge:
        pod_core:
        pod_storage:
        pod_compute:
        pod_ultra:

    # =========================================================================
    # EDGE POD — North-south, ISP peering, firewalls, DMZ, campus/WiFi
    # =========================================================================
    pod_edge:
      vars:
        pod_name: edge
        pod_id: 1
        oversubscription: "1:1"
        # VRFs hosted in this pod
        vrf_list:
          - PUBLIC
          - CAMPUS
      hosts:
        leaf-01:
          ansible_host: 172.20.20.21
          router_id: 10.0.1.1
          loopback0: 10.0.1.1/32
          bgp_as: 65101
          spine01_p2p: "10.1.1.0/31"   # spine-01 side .0, leaf side .1
          spine02_p2p: "10.2.1.0/31"
          spine01_leaf_ip: 10.1.1.1
          spine02_leaf_ip: 10.2.1.1
          esi_peer: leaf-02
        leaf-02:
          ansible_host: 172.20.20.22
          router_id: 10.0.1.2
          loopback0: 10.0.1.2/32
          bgp_as: 65102
          spine01_p2p: "10.1.2.0/31"
          spine02_p2p: "10.2.2.0/31"
          spine01_leaf_ip: 10.1.2.1
          spine02_leaf_ip: 10.2.2.1
          esi_peer: leaf-01

    # =========================================================================
    # CORE POD — Shared infra: DNS/DHCP/NTP, Zabbix, FTP, LMS, admin servers
    # =========================================================================
    pod_core:
      vars:
        pod_name: core
        pod_id: 2
        oversubscription: "2:1"
        vrf_list:
          - ADMIN
          - INFRA
          - LMS
          - SERVICES
      hosts:
        leaf-03:
          ansible_host: 172.20.20.23
          router_id: 10.0.2.1
          loopback0: 10.0.2.1/32
          bgp_as: 65103
          spine01_p2p: "10.1.3.0/31"
          spine02_p2p: "10.2.3.0/31"
          spine01_leaf_ip: 10.1.3.1
          spine02_leaf_ip: 10.2.3.1
          esi_peer: leaf-04
        leaf-04:
          ansible_host: 172.20.20.24
          router_id: 10.0.2.2
          loopback0: 10.0.2.2/32
          bgp_as: 65104
          spine01_p2p: "10.1.4.0/31"
          spine02_p2p: "10.2.4.0/31"
          spine01_leaf_ip: 10.1.4.1
          spine02_leaf_ip: 10.2.4.1
          esi_peer: leaf-03

    # =========================================================================
    # STORAGE POD — Ceph-backed storage cluster, 1:1 oversubscription
    # =========================================================================
    pod_storage:
      vars:
        pod_name: storage
        pod_id: 3
        oversubscription: "1:1"
        vrf_list:
          - STORAGE
      hosts:
        leaf-05:
          ansible_host: 172.20.20.25
          router_id: 10.0.3.1
          loopback0: 10.0.3.1/32
          bgp_as: 65105
          spine01_p2p: "10.1.5.0/31"
          spine02_p2p: "10.2.5.0/31"
          spine01_leaf_ip: 10.1.5.1
          spine02_leaf_ip: 10.2.5.1
          esi_peer: leaf-06
        leaf-06:
          ansible_host: 172.20.20.26
          router_id: 10.0.3.2
          loopback0: 10.0.3.2/32
          bgp_as: 65106
          spine01_p2p: "10.1.6.0/31"
          spine02_p2p: "10.2.6.0/31"
          spine01_leaf_ip: 10.1.6.1
          spine02_leaf_ip: 10.2.6.1
          esi_peer: leaf-05

    # =========================================================================
    # COMPUTE POD — General-purpose multi-tenant virtualized workloads, 4:1
    # =========================================================================
    pod_compute:
      vars:
        pod_name: compute
        pod_id: 4
        oversubscription: "4:1"
        vrf_list:
          - TENANT_A
          - TENANT_B
      hosts:
        leaf-07:
          ansible_host: 172.20.20.27
          router_id: 10.0.4.1
          loopback0: 10.0.4.1/32
          bgp_as: 65107
          spine01_p2p: "10.1.7.0/31"
          spine02_p2p: "10.2.7.0/31"
          spine01_leaf_ip: 10.1.7.1
          spine02_leaf_ip: 10.2.7.1
          esi_peer: leaf-08
        leaf-08:
          ansible_host: 172.20.20.28
          router_id: 10.0.4.2
          loopback0: 10.0.4.2/32
          bgp_as: 65108
          spine01_p2p: "10.1.8.0/31"
          spine02_p2p: "10.2.8.0/31"
          spine01_leaf_ip: 10.1.8.1
          spine02_leaf_ip: 10.2.8.1
          esi_peer: leaf-07

    # =========================================================================
    # ULTRA COMPUTE POD — GPU/HPC bare-metal, 1:1, 100G, RoCEv2/RDMA
    # =========================================================================
    pod_ultra:
      vars:
        pod_name: ultra
        pod_id: 5
        oversubscription: "1:1"
        roce_enabled: true
        dcqcn_enabled: true
        vrf_list:
          - HPC
          - STUDENT
      hosts:
        leaf-09:
          ansible_host: 172.20.20.29
          router_id: 10.0.5.1
          loopback0: 10.0.5.1/32
          bgp_as: 65109
          spine01_p2p: "10.1.9.0/31"
          spine02_p2p: "10.2.9.0/31"
          spine01_leaf_ip: 10.1.9.1
          spine02_leaf_ip: 10.2.9.1
          esi_peer: leaf-10
        leaf-10:
          ansible_host: 172.20.20.30
          router_id: 10.0.5.2
          loopback0: 10.0.5.2/32
          bgp_as: 65110
          spine01_p2p: "10.1.10.0/31"
          spine02_p2p: "10.2.10.0/31"
          spine01_leaf_ip: 10.1.10.1
          spine02_leaf_ip: 10.2.10.1
          esi_peer: leaf-09

    # =========================================================================
    # FIREWALLS — Alpine/nftables/keepalived HA pair on Edge Pod
    # =========================================================================
    firewalls:
      vars:
        ansible_connection: ssh
        ansible_network_os: ""
        ansible_python_interpreter: /usr/bin/python3
        fw_vrrp_password: "esifw2024"
      hosts:
        firewall-01:
          ansible_host: 172.20.20.101
          fw_priority: 110
          fw_role: primary
        firewall-02:
          ansible_host: 172.20.20.102
          fw_priority: 100
          fw_role: secondary

    # =========================================================================
    # SERVERS — categorised by pod/function
    # =========================================================================
    servers:
      children:
        servers_edge:
        servers_core:
        servers_storage:
        servers_compute:
        servers_ultra:

    servers_edge:
      vars:
        ansible_connection: ssh
        ansible_python_interpreter: /usr/bin/python3
      hosts:
        server-dmz-01:
          ansible_host: 172.20.20.158
          server_vrf: PUBLIC
          server_vlan: 100
          server_ip: 192.168.100.10/24
          server_gw: 192.168.100.1

    servers_core:
      vars:
        ansible_connection: ssh
        ansible_python_interpreter: /usr/bin/python3
      hosts:
        server-admin-01:
          ansible_host: 172.20.20.153
          server_vrf: ADMIN
          server_vlan: 200
          server_ip: 192.168.200.11/24
          server_gw: 192.168.200.1
        server-admin-02:
          ansible_host: 172.20.20.154
          server_vrf: ADMIN
          server_vlan: 200
          server_ip: 192.168.200.12/24
          server_gw: 192.168.200.1

    servers_storage:
      vars:
        ansible_connection: ssh
        ansible_python_interpreter: /usr/bin/python3
      hosts:
        server-hpc-01:
          ansible_host: 172.20.20.155
          server_vrf: STORAGE
          server_vlan: 300
          server_ip: 192.168.130.11/24
          server_gw: 192.168.130.1
        server-hpc-02:
          ansible_host: 172.20.20.156
          server_vrf: STORAGE
          server_vlan: 300
          server_ip: 192.168.130.12/24
          server_gw: 192.168.130.1
        server-storage-01:
          ansible_host: 172.20.20.157
          server_vrf: STORAGE
          server_vlan: 310
          server_ip: 192.168.131.10/24
          server_gw: 192.168.131.1

    servers_compute:
      vars:
        ansible_connection: ssh
        ansible_python_interpreter: /usr/bin/python3
      hosts: {}   # placeholder for dynamic workload VMs

    servers_ultra:
      vars:
        ansible_connection: ssh
        ansible_python_interpreter: /usr/bin/python3
      hosts:
        server-student-01:
          ansible_host: 172.20.20.151
          server_vrf: STUDENT
          server_vlan: 500
          server_ip: 192.168.50.11/24
          server_gw: 192.168.50.1
          lacp_bond: true
        server-student-02:
          ansible_host: 172.20.20.152
          server_vrf: STUDENT
          server_vlan: 500
          server_ip: 192.168.50.12/24
          server_gw: 192.168.50.1
          lacp_bond: true

    # =========================================================================
    # INFRASTRUCTURE SERVICES (OOB / management plane)
    # =========================================================================
    infra_services:
      vars:
        ansible_connection: ssh
        ansible_python_interpreter: /usr/bin/python3
      hosts:
        ntp-server:
          ansible_host: 172.20.20.163
        dns-server:
          ansible_host: 172.20.20.164
        dhcp-server:
          ansible_host: 172.20.20.165
        zabbix-server:
          ansible_host: 172.20.20.167
        syslog-server:
          ansible_host: 172.20.20.174
        bastion-01:
          ansible_host: 172.20.20.50