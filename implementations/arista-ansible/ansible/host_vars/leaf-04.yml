# =============================================================================
# ESI Data Center — Leaf-04 Host Variables
# Pod: Core (pod_id=2) | ESI pair: leaf-04 ↔ leaf-03
# Role: Admin servers (eth3/eth5), services-web (eth4), syslog (eth6),
#       NTP dual-home (eth9), DNS dual-home (eth7), DHCP dual-home (eth8)
# BGP AS: 65104
# Management IP: 172.20.20.24
# =============================================================================

ansible_host: 172.20.20.24
router_id: 10.0.2.2
loopback0: 10.0.2.2/32
bgp_as: 65104
underlay_asn: 65104
# -----------------------------------------------------------------------------
# Spine uplink P2P addresses (leaf side = .1)
# -----------------------------------------------------------------------------
spine01_p2p: 10.1.4.0/31
spine02_p2p: 10.2.4.0/31
spine01_leaf_ip: 10.1.4.1
spine02_leaf_ip: 10.2.4.1
spine01_ip: 10.1.4.0
spine02_ip: 10.2.4.0

# -----------------------------------------------------------------------------
# ESI Multi-homing parameters (paired with leaf-03)
# ESI = 00:00:00:00:00:02:04:00:00:01  (pod=02, position=04)
# -----------------------------------------------------------------------------
esi_peer: leaf-03
esi_id: "0000:0000:0204:0000:0001"
esi_portchannel_id: 12
esi_lacp_id: "0000.0204.0001"

# -----------------------------------------------------------------------------
# Uplink interface names (ContainerLab cEOS naming)
# -----------------------------------------------------------------------------
spine01_interface: Ethernet1 # → spine-01 : Ethernet4
spine02_interface: Ethernet2 # → spine-02 : Ethernet4
peer_interface: Ethernet10 # → leaf-03 ESI heartbeat

# -----------------------------------------------------------------------------
# Physical interface map
# -----------------------------------------------------------------------------
interfaces:
  Ethernet1:
    description: "P2P → spine-01 eth4 [10.1.4.0/31]"
    ip: 10.1.4.1/31
    mtu: "{{ mtu_fabric }}"
    type: routed

  Ethernet2:
    description: "P2P → spine-02 eth4 [10.2.4.0/31]"
    ip: 10.2.4.1/31
    mtu: "{{ mtu_fabric }}"
    type: routed

  Ethernet3:
    description: "server-admin-01 eth2 [VLAN 200 ADMIN — ESI bond]"
    type: access
    access_vlan: 200
    mtu: "{{ mtu_host }}"
    channel_group: 12 # Port-Channel12 — ESI LAG with leaf-03 Po10

  Ethernet4:
    description: "services-web eth1 [VLAN 230 SERVICES]"
    type: access
    access_vlan: 230
    mtu: "{{ mtu_host }}"
    spanning_tree_portfast: true

  Ethernet5:
    description: "server-admin-02 eth2 [VLAN 200 ADMIN — ESI bond]"
    type: access
    access_vlan: 200
    mtu: "{{ mtu_host }}"
    channel_group: 13 # Port-Channel13 — ESI LAG with leaf-03 Po11

  Ethernet6:
    description: "syslog-server eth1 [VLAN 210 INFRA]"
    type: access
    access_vlan: 210
    mtu: "{{ mtu_host }}"
    spanning_tree_portfast: true

  Ethernet7:
    description: "dns-server eth2 [VLAN 210 INFRA — dual-home]"
    type: access
    access_vlan: 210
    mtu: "{{ mtu_host }}"
    spanning_tree_portfast: true

  Ethernet8:
    description: "dhcp-server eth2 [VLAN 210 INFRA — dual-home]"
    type: access
    access_vlan: 210
    mtu: "{{ mtu_host }}"
    spanning_tree_portfast: true

  Ethernet9:
    description: "ntp-server eth3 [VLAN 210 INFRA — dual-home]"
    type: access
    access_vlan: 210
    mtu: "{{ mtu_host }}"
    spanning_tree_portfast: true

  Ethernet10:
    description: "OOB switch uplink"
    type: access
    access_vlan: 1

# -----------------------------------------------------------------------------
# Loopback
# -----------------------------------------------------------------------------
loopbacks:
  Loopback0:
    ip: 10.0.2.2/32
    description: "Router-ID / VTEP"

# -----------------------------------------------------------------------------
# VXLAN VTEP
# -----------------------------------------------------------------------------
vtep_source_interface: Loopback0
vtep_ip: 10.0.2.2

# -----------------------------------------------------------------------------
# ESI Port-Channels (dual-homed admin servers — shared with leaf-03)
# -----------------------------------------------------------------------------
port_channels:
  - id: 12
    description: "ESI LAG → server-admin-01 (leaf-04 leg)"
    lacp_mode: active
    members: [Ethernet3]
    esi: "0000:0000:0002:0012:0001"
    lacp_system_id: "0002.0012.0001"
    access_vlan: 200

  - id: 13
    description: "ESI LAG → server-admin-02 (leaf-04 leg)"
    lacp_mode: active
    members: [Ethernet5]
    esi: "0000:0000:0002:0013:0001"
    lacp_system_id: "0002.0013.0001"
    access_vlan: 200

# -----------------------------------------------------------------------------
# BGP neighbors
# -----------------------------------------------------------------------------
bgp_neighbors:
  - peer_ip: 10.1.4.0
    remote_as: 65000
    description: "spine-01 underlay"
    address_family: [ipv4_unicast]

  - peer_ip: 10.2.4.0
    remote_as: 65000
    description: "spine-02 underlay"
    address_family: [ipv4_unicast]

  - peer_ip: 10.0.0.1
    remote_as: 65000
    description: "spine-01 EVPN"
    update_source: Loopback0
    ebgp_multihop: 3
    address_family: [evpn]

  - peer_ip: 10.0.0.2
    remote_as: 65000
    description: "spine-02 EVPN"
    update_source: Loopback0
    ebgp_multihop: 3
    address_family: [evpn]

# -----------------------------------------------------------------------------
# VRFs active on leaf-04 (Core Pod B — mirrors leaf-03)
# -----------------------------------------------------------------------------
active_vrfs:
  - name: ADMIN
    vrf_id: 200
    l3vni: 10200
    rd: "10.0.2.2:10200"
    rt_import: "65000:10200"
    rt_export: "65000:10200"

  - name: INFRA
    vrf_id: 210
    l3vni: 10210
    rd: "10.0.2.2:10210"
    rt_import: "65000:10210"
    rt_export: "65000:10210"

  - name: LMS
    vrf_id: 220
    l3vni: 10220
    rd: "10.0.2.2:10220"
    rt_import: "65000:10220"
    rt_export: "65000:10220"

  - name: SERVICES
    vrf_id: 230
    l3vni: 10230
    rd: "10.0.2.2:10230"
    rt_import: "65000:10230"
    rt_export: "65000:10230"

# -----------------------------------------------------------------------------
# VLANs / VNIs active on leaf-04
# -----------------------------------------------------------------------------
active_vlans:
  - id: 200
    vni: 10200
    vrf: ADMIN
    anycast_gw_ip: 192.168.200.1/24
    anycast_gw_mac: 00:1c:73:00:02:00
    arp_suppression: true
    description: "ADMIN servers"

  - id: 210
    vni: 10210
    vrf: INFRA
    anycast_gw_ip: 192.168.20.1/24
    anycast_gw_mac: 00:1c:73:00:02:10
    arp_suppression: true
    description: "INFRA-MGMT services"

  - id: 220
    vni: 10220
    vrf: LMS
    anycast_gw_ip: 192.168.30.1/24
    anycast_gw_mac: 00:1c:73:00:02:20
    arp_suppression: true
    description: "LMS-STAFF"

  - id: 230
    vni: 10230
    vrf: SERVICES
    anycast_gw_ip: 192.168.40.1/24
    anycast_gw_mac: 00:1c:73:00:02:30
    arp_suppression: true
    description: "SERVICES-WEB"

# -----------------------------------------------------------------------------
# Host-facing ports
# -----------------------------------------------------------------------------
host_ports:
  - interface: Ethernet3
    description: "server-admin-01 eth2 | ESI bond member"
    mode: access
    vlan: 200
    mtu: 9000
    portchannel: Port-Channel12

  - interface: Ethernet4
    description: "services-web [VLAN 230]"
    mode: access
    vlan: 230
    mtu: 9000
    spanning_tree_portfast: true
    bpduguard: true

  - interface: Ethernet5
    description: "server-admin-02 eth2 | ESI bond member"
    mode: access
    vlan: 200
    mtu: 9000
    portchannel: Port-Channel13

  - interface: Ethernet6
    description: "syslog-server [VLAN 210]"
    mode: access
    vlan: 210
    mtu: 9000
    spanning_tree_portfast: true
    bpduguard: true

  - interface: Ethernet7
    description: "dns-server dual-home [VLAN 210]"
    mode: access
    vlan: 210
    mtu: 9000
    spanning_tree_portfast: true
    bpduguard: true

  - interface: Ethernet8
    description: "dhcp-server dual-home [VLAN 210]"
    mode: access
    vlan: 210
    mtu: 9000
    spanning_tree_portfast: true
    bpduguard: true

  - interface: Ethernet9
    description: "ntp-server dual-home [VLAN 210]"
    mode: access
    vlan: 210
    mtu: 9000
    spanning_tree_portfast: true
    bpduguard: true

# VLAN→VNI map (used by arista-evpn role)
vlan_vni_map:
  - vlan: 200
    vni: 10200
    name: ADMIN
  - vlan: 210
    vni: 10210
    name: INFRA-MGMT
  - vlan: 220
    vni: 10220
    name: LMS-STAFF
  - vlan: 230
    vni: 10230
    name: SERVICES-WEB

# -----------------------------------------------------------------------------
# Communication Domains — consumed by arista-evpn role
# -----------------------------------------------------------------------------
communication_domains:
  - vrf: ADMIN
    l3vni: 10200
    rd: "10.0.2.2:10200"
    rt_import: ["65000:10200"]
    rt_export: ["65000:10200"]
    vlans:
      - id: 200
        name: ADMIN
        vni: 10200
        vrf: ADMIN
        rt: "65000:10200"
        gateway: "192.168.200.1"
        prefix: "192.168.200.0/24"

  - vrf: INFRA
    l3vni: 10210
    rd: "10.0.2.2:10210"
    rt_import: ["65000:10210"]
    rt_export: ["65000:10210"]
    vlans:
      - id: 210
        name: INFRA-MGMT
        vni: 10210
        vrf: INFRA
        rt: "65000:10210"
        gateway: "192.168.20.1"
        prefix: "192.168.20.0/24"

  - vrf: LMS
    l3vni: 10220
    rd: "10.0.2.2:10220"
    rt_import: ["65000:10220"]
    rt_export: ["65000:10220"]
    vlans:
      - id: 220
        name: LMS-STAFF
        vni: 10220
        vrf: LMS
        rt: "65000:10220"
        gateway: "192.168.30.1"
        prefix: "192.168.30.0/24"

  - vrf: SERVICES
    l3vni: 10230
    rd: "10.0.2.2:10230"
    rt_import: ["65000:10230"]
    rt_export: ["65000:10230"]
    vlans:
      - id: 230
        name: SERVICES-WEB
        vni: 10230
        vrf: SERVICES
        rt: "65000:10230"
        gateway: "192.168.40.1"
        prefix: "192.168.40.0/24"
