# =============================================================================
# ESI Data Center — Leaf-10 Host Variables
# Pod: Ultra Compute (pod_id=5) | ESI pair: leaf-10 ↔ leaf-09
# Special: RoCEv2/RDMA enabled, DCQCN, PFC, student LACP bond secondary
# Management IP: 172.20.20.30
# =============================================================================

ansible_host: 172.20.20.30

# -----------------------------------------------------------------------------
# Underlay identity — used by arista-underlay role
# router_id / bgp_as kept for backward compat with other roles/templates
# -----------------------------------------------------------------------------
router_id: 10.0.5.2
loopback0: 10.0.5.2/32
loopback0_description: "Router-ID / VTEP"
bgp_as: 65110
underlay_asn: 65110 # required by arista-underlay role
bgp_router_id: 10.0.5.2 # required by arista-underlay role

# VTEP
vtep_ip: 10.0.5.2
vtep_loopback: Loopback0
vtep_source_interface: Loopback0
vtep_interface: Loopback1
vxlan_interface: Vxlan1
vxlan_udp_port: 4789
vxlan_flood_learning: head-end-replication

# -----------------------------------------------------------------------------
# P2P underlay links — used by arista-underlay role (p2p_links loop)
# Flat spine*_* vars kept for backward compat
# -----------------------------------------------------------------------------
spine01_interface: Ethernet1 # → spine-01 : Ethernet10
spine02_interface: Ethernet2 # → spine-02 : Ethernet10
peer_interface: Ethernet10 # → leaf-09 ESI heartbeat

spine01_p2p: 10.1.10.0/31
spine02_p2p: 10.2.10.0/31
spine01_leaf_ip: 10.1.10.1
spine02_leaf_ip: 10.2.10.1
spine01_ip: 10.1.10.0
spine02_ip: 10.2.10.0

p2p_links:
  - interface: Ethernet1
    ip: 10.1.10.1/31
    description: "FABRIC | P2P → spine-01 eth10 [10.1.10.0/31]"
    mtu: 9214
  - interface: Ethernet2
    ip: 10.2.10.1/31
    description: "FABRIC | P2P → spine-02 eth10 [10.2.10.0/31]"
    mtu: 9214

# -----------------------------------------------------------------------------
# BGP knobs — used by arista-underlay and arista-evpn roles
# -----------------------------------------------------------------------------
bgp_spine_as: 65000
bgp_timers_keepalive: 3
bgp_timers_hold: 9
bgp_bfd: true
bgp_bfd_min_interval: 300
bgp_bfd_multiplier: 3
bgp_max_prefixes_ipv4: 100
bgp_max_prefixes_evpn: 500
bgp_send_community: extended
bgp_leaf_peer_group_underlay: SPINE-UNDERLAY
bgp_leaf_peer_group_evpn: SPINE-EVPN
leaf_evpn_peer_group: SPINE-EVPN

# -----------------------------------------------------------------------------
# ESI Multi-homing — leaf-10 ↔ leaf-09
# -----------------------------------------------------------------------------
esi_peer: leaf-09
esi_id: "0000:0000:0510:0000:0001"
esi_portchannel_id: 60
esi_lacp_id: "0000.0510.0001"
esi_lacp_system_id_prefix: "0000.0000"
evpn_multihoming: true

# -----------------------------------------------------------------------------
# Pod identity
# -----------------------------------------------------------------------------
pod_id: 5
pod_name: ultra
pod_vnis:
  - 10
  - 20

# -----------------------------------------------------------------------------
# Physical interface map
# -----------------------------------------------------------------------------
loopbacks:
  Loopback0:
    description: "Router-ID / VTEP"
    ip: 10.0.5.2/32

interfaces:
  Ethernet1:
    description: "P2P → spine-01 eth10 [10.1.10.0/31]"
    ip: 10.1.10.1/31
    mtu: "{{ mtu_fabric }}"
    type: routed
  Ethernet2:
    description: "P2P → spine-02 eth10 [10.2.10.0/31]"
    ip: 10.2.10.1/31
    mtu: "{{ mtu_fabric }}"
    type: routed
  Ethernet3:
    description: "server-student-01 eth2 [VLAN 500 STUDENT — ESI bond secondary]"
    type: trunk
    access_vlan: 500
    mtu: 9000
    channel_group: 60
    lacp_mode: active
    lacp_rate: fast
  Ethernet4:
    description: "server-student-02 eth2 [VLAN 500 STUDENT — ESI bond secondary]"
    type: trunk
    access_vlan: 500
    mtu: 9000
    channel_group: 61
    lacp_mode: active
    lacp_rate: fast
  Ethernet10:
    description: "OOB switch uplink"
    type: access
    access_vlan: 1

# -----------------------------------------------------------------------------
# VRFs active on leaf-10
# Mirrors leaf-09 — both leaves form the Ultra Compute Pod
# -----------------------------------------------------------------------------
vrf_list:
  - HPC
  - STUDENT

active_vrfs:
  - name: HPC
    vrf_id: 400
    l3vni: 10400
    rd: "10.0.5.2:10400"
    rt_import: "65000:10400"
    rt_export: "65000:10400"
    extra_rt_import:
      - "65000:10300" # STORAGE VRF — Ceph I/O routes

  - name: STUDENT
    vrf_id: 500
    l3vni: 10500
    rd: "10.0.5.2:10500"
    rt_import: "65000:10500"
    rt_export: "65000:10500"

# -----------------------------------------------------------------------------
# VLANs / VNIs
# Anycast MAC must be IDENTICAL to leaf-09 (symmetric IRB requirement)
# -----------------------------------------------------------------------------
vlan_vni_map:
  - name: HPC-DATA
    vlan: 400
    vni: 10400
  - name: STUDENT-WORKLOAD
    vlan: 500
    vni: 10500

active_vlans:
  - id: 400
    vni: 10400
    vrf: HPC
    anycast_gw_ip: 192.168.60.1/24
    anycast_gw_mac: 00:1c:73:00:04:00 # same as leaf-09
    arp_suppression: true
    description: "HPC-DATA (RoCEv2)"
    pfc_enabled: true
    pfc_priority: 3

  - id: 500
    vni: 10500
    vrf: STUDENT
    anycast_gw_ip: 192.168.50.1/24
    anycast_gw_mac: 00:1c:73:00:05:00 # same as leaf-09
    arp_suppression: true
    description: "STUDENT-WORKLOAD"

# -----------------------------------------------------------------------------
# Port-Channels — student LACP bonds (secondary legs to leaf-10)
# leaf-09 hosts Po20 primary; leaf-10 hosts Po60/Po61 secondary
# Both share the same ESI and LACP system-id for EVPN ESI multi-homing
# -----------------------------------------------------------------------------
lacp_rate: fast

portchannels:
  - id: 60
    description: "Po60 | server-student-01 LACP bond (leaf-10 leg)"
    mode: active
    members:
      - Ethernet3
    vlan: 500
    vrf: STUDENT
    mtu: 9000
    esi: "0000:0000:0509:0000:0001" # same ESI as leaf-09 Po20
    lacp_system_id: "0000.0509.0001" # same LACP system-id

  - id: 61
    description: "Po61 | server-student-02 LACP bond (leaf-10 leg)"
    mode: active
    members:
      - Ethernet4
    vlan: 500
    vrf: STUDENT
    mtu: 9000
    esi: "0000:0000:0509:0001:0001"
    lacp_system_id: "0000.0509.0011"

# -----------------------------------------------------------------------------
# Host-facing ports
# -----------------------------------------------------------------------------
host_port_mode: trunk
host_port_native_vlan: 1

host_ports:
  - interface: Ethernet3
    description: "server-student-01 | LACP bond member (leaf-10 leg)"
    mode: trunk
    vlan: 500
    portchannel: Port-Channel60
    lacp_mode: active
    lacp_rate: fast
    mtu: 9000

  - interface: Ethernet4
    description: "server-student-02 | LACP bond member (leaf-10 leg)"
    mode: trunk
    vlan: 500
    portchannel: Port-Channel61
    lacp_mode: active
    lacp_rate: fast
    mtu: 9000

# -----------------------------------------------------------------------------
# QoS — RoCEv2 / DCQCN (same policy as leaf-09)
# -----------------------------------------------------------------------------
qos_policy_name: ULTRA-ROCE-QOS
dcqcn_enabled: true
dcqcn_cnp_dscp: 48
roce_enabled: true
ecn_min_threshold_kb: 150
ecn_max_threshold_kb: 1500

traffic_class_map:
  - cos: 3
    tc: 3
    pfc: true

ets_bw_map:
  - tc: 3
    bw_pct: 50 # RoCEv2 lossless class
  - tc: 0
    bw_pct: 50 # Best-effort

# -----------------------------------------------------------------------------
# Fabric-wide settings (mirror group_vars — explicit here for clarity)
# -----------------------------------------------------------------------------
mtu_fabric: 9214
mtu_host: 9000
uplink_speed: 10g
oversubscription: "1:1"
anycast_gateway_mac: 00:1c:73:aa:bb:cc
arp_suppression: true
fabric_port_description_prefix: "FABRIC | "
spanning_tree_bpduguard: true
spanning_tree_portfast: true

leaf_eos_features:
  - vxlan
  - "routing bgp"
  - "spanning-tree portfast default"
  - "hardware speed unsupported forced"

# -----------------------------------------------------------------------------
# Management / infra services
# -----------------------------------------------------------------------------
lldp_enabled: true
lldp_tlv_transmit:
  - system-name
  - system-description
  - management-address
  - port-description

ntp_servers:
  - 192.168.20.200
  - 172.20.20.163

dns_servers:
  - 192.168.20.201
  - 1.1.1.1

domain_name: esi.lab
mgmt_subnet: 172.20.20.0/24
mgmt_user: admin
mgmt_password: admin
enable_password: ""

snmp_community: esi-ro
snmp_contact: noc@esi.lab
snmp_location: "ESI DataCenter Lab"

syslog_server: 192.168.20.174
syslog_level: informational
syslog_facility: local7

zabbix_server: 192.168.20.167

public_domain_no_rfc1918: true
rfc1918_prefix_list_name: PL-BLOCK-RFC1918

lab_name: esi-datacenter

login_banner: |
  ******************************************************************
  *  ESI Data Center Lab — Authorised access only                  *
  *  All sessions are monitored and recorded                       *
  ******************************************************************

# -----------------------------------------------------------------------------
# Communication Domains — consumed by arista-evpn role
# -----------------------------------------------------------------------------
communication_domains:
  - vrf: HPC
    l3vni: 10400
    rd: "10.0.5.2:10400"
    rt_import: ["65000:10400"]
    rt_export: ["65000:10400"]
    vlans:
      - id: 400
        name: HPC-DATA
        vni: 10400
        vrf: HPC
        rt: "65000:10400"
        gateway: "192.168.60.1"
        prefix: "192.168.60.0/24"

  - vrf: STUDENT
    l3vni: 10500
    rd: "10.0.5.2:10500"
    rt_import: ["65000:10500"]
    rt_export: ["65000:10500"]
    vlans:
      - id: 500
        name: STUDENT-WORKLOAD
        vni: 10500
        vrf: STUDENT
        rt: "65000:10500"
        gateway: "192.168.50.1"
        prefix: "192.168.50.0/24"
