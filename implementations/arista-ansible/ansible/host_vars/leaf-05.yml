# =============================================================================
# ESI Data Center — Leaf-05 Host Variables
# Pod: Storage (pod_id=3) | ESI pair: leaf-05 ↔ leaf-06
# Management IP: 172.20.20.25
# =============================================================================

ansible_host: 172.20.20.25
router_id: 10.0.3.1
loopback0: 10.0.3.1/32
bgp_as: 65105
underlay_asn: 65105

# -----------------------------------------------------------------------------
# Spine uplink P2P addresses (leaf side = .1)
# -----------------------------------------------------------------------------
spine01_p2p: 10.1.5.0/31
spine02_p2p: 10.2.5.0/31
spine01_leaf_ip: 10.1.5.1
spine02_leaf_ip: 10.2.5.1

# Spine-side IPs (used in BGP neighbor statements on this leaf)
spine01_ip: 10.1.5.0
spine02_ip: 10.2.5.0

# -----------------------------------------------------------------------------
# ESI Multi-homing parameters (paired with leaf-06)
# ESI = 00:00:00:00:00:03:05:00:00:01  (pod=03, position=05)
# -----------------------------------------------------------------------------
esi_peer: leaf-06
esi_id: "0000:0000:0305:0000:0001"
esi_portchannel_id: 35 # Po35 — leaf-05↔leaf-06 MLAG-free ESI LAG
esi_lacp_id: "0000.0305.0001"

# -----------------------------------------------------------------------------
# Uplink interface names (Containerlab cEOS naming)
# -----------------------------------------------------------------------------
spine01_interface: Ethernet1 # → spine-01 : Ethernet5
spine02_interface: Ethernet2 # → spine-02 : Ethernet5
peer_interface: Ethernet10 # → leaf-06 (ESI peer-link, if needed)

# -----------------------------------------------------------------------------
# VRFs and VNIs active on this leaf  (Storage Pod)
# Pulled from group_vars/pod_storage.yml → pod_vlans
# -----------------------------------------------------------------------------
active_vrfs:
  - name: STORAGE
    vrf_id: 300
    l3vni: 10300
    rd: "10.0.3.1:300"
    rt_import: "65000:10300"
    rt_export: "65000:10300"

active_vlans:
  - id: 300
    vni: 10300
    vrf: STORAGE
    anycast_gw_ip: 192.168.130.1/24
    anycast_gw_mac: 00:1c:73:00:03:00
    arp_suppression: true
    description: "STORAGE-CEPH-PUBLIC"
  - id: 310
    vni: 10310
    vrf: STORAGE
    anycast_gw_ip: 192.168.131.1/24
    anycast_gw_mac: 00:1c:73:00:03:10
    arp_suppression: true
    description: "STORAGE-CEPH-PRIVATE"

# -----------------------------------------------------------------------------
# Host-facing ports
# -----------------------------------------------------------------------------
host_ports:
  - interface: Ethernet3
    description: "server-hpc-01 | Ceph public (VLAN 300)"
    mode: access
    vlan: 300
    mtu: 9000
    spanning_tree_portfast: true
    bpduguard: true

  - interface: Ethernet4
    description: "server-hpc-01 | Ceph replication (VLAN 310)"
    mode: access
    vlan: 310
    mtu: 9000
    spanning_tree_portfast: true
    bpduguard: true

# -----------------------------------------------------------------------------
# QoS — Ceph replication traffic prioritization (from pod_storage.yml)
# Applied on VLAN 310 egress toward OSD peers
# -----------------------------------------------------------------------------
qos_policy_name: STORAGE-QOS
qos_ceph_replication_dscp: 18 # AF21

# -----------------------------------------------------------------------------
# BGP communities advertised for storage prefixes
# Used for route filtering at fabric edge (prevent storage leaking to STUDENT)
# -----------------------------------------------------------------------------
bgp_community_storage: "65000:300"

# -----------------------------------------------------------------------------
# Communication Domains — consumed by arista-evpn role
# -----------------------------------------------------------------------------
communication_domains:
  - vrf: STORAGE
    l3vni: 10300
    rd: "10.0.3.1:10300"
    rt_import: ["65000:10300"]
    rt_export: ["65000:10300"]
    vlans:
      - id: 300
        name: STORAGE-CEPH-PUBLIC
        vni: 10300
        vrf: STORAGE
        rt: "65000:10300"
        gateway: "192.168.130.1"
        prefix: "192.168.130.0/24"
      - id: 310
        name: STORAGE-CEPH-PRIVATE
        vni: 10310
        vrf: STORAGE
        rt: "65000:10310"
        gateway: "192.168.131.1"
        prefix: "192.168.131.0/24"
