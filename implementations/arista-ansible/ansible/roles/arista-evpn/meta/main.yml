galaxy_info:
  role_name: arista_evpn
  author: ESI Lab
  description: "MP-BGP EVPN overlay with VXLAN, VRFs, symmetric IRB for Arista cEOS"
  license: MIT
  min_ansible_version: "2.15"
  platforms:
    - name: EOS
      versions: ["4.35"]

dependencies:
  - role: arista-common      # hostname, EOS baseline, NTP, logging
  - role: arista-underlay    # BGP underlay must be up before overlay
