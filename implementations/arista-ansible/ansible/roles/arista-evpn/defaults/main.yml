# =============================================================================
# Role: arista-evpn — Tasks (tasks/main.yml)
# Clean, reliable, and consistent with group_vars/fabric.yml
# =============================================================================

- name: EVPN | Build all_l2vnis from communication_domains (single source of truth)
  ansible.builtin.set_fact:
    all_l2vnis: >-
      {{
        communication_domains
        | map(attribute='vlans', default=[])
        | flatten
        | map('combine', {'vrf': item.vrf, 'l3vni': item.l3vni})
        | list
      }}
  vars:
    item: "{{ item }}"
  loop: "{{ communication_domains }}"
  tags: [evpn, facts]

- name: EVPN | Derive leaf_active_l2vnis based on pod_vnis
  ansible.builtin.set_fact:
    leaf_active_l2vnis: >-
      {{
        all_l2vnis
        | selectattr('id', 'in', (pod_vnis | default([])))
        | list
      }}
  tags: [evpn, facts]

- name: EVPN | Derive leaf_active_vrfs
  ansible.builtin.set_fact:
    leaf_active_vrfs: >-
      {{
        leaf_active_l2vnis
        | map(attribute='vrf')
        | unique
        | list
      }}
  tags: [evpn, facts]

- name: EVPN | Derive leaf_active_domains (full domain objects)
  ansible.builtin.set_fact:
    leaf_active_domains: >-
      {{
        communication_domains
        | selectattr('vrf', 'in', leaf_active_vrfs)
        | list
      }}
  tags: [evpn, facts]

# =============================================================================
# 1. Features & Global Settings
# =============================================================================
- name: EVPN | Enable required features
  arista.eos.eos_config:
    lines:
      - "feature vxlan"
    match: none
  ignore_errors: true
  tags: [evpn, features]

- name: EVPN | Set anycast gateway MAC (Symmetric IRB)
  arista.eos.eos_config:
    lines: "ip virtual-router mac-address {{ anycast_gateway_mac }}"
  tags: [evpn, anycast]

# =============================================================================
# 2. RFC1918 Isolation for VRF-PUBLIC (DMZ)
# =============================================================================
- name: EVPN | Create RFC1918 prefix-list for DMZ isolation
  arista.eos.eos_config:
    lines:
      - "ip prefix-list {{ rfc1918_prefix_list_name }} seq 10 deny 10.0.0.0/8 le 32"
      - "ip prefix-list {{ rfc1918_prefix_list_name }} seq 20 deny 172.16.0.0/12 le 32"
      - "ip prefix-list {{ rfc1918_prefix_list_name }} seq 30 deny 192.168.0.0/16 le 32"
      - "ip prefix-list {{ rfc1918_prefix_list_name }} seq 100 permit 0.0.0.0/0 le 32"
    match: line
  when:
    - "'VRF-PUBLIC' in leaf_active_vrfs"
    - public_domain_no_rfc1918 | default(true) | bool
  tags: [evpn, dmz, policy]

# =============================================================================
# 3. VRFs + IP Routing
# =============================================================================
- name: EVPN | Create VRF instances
  arista.eos.eos_vrf:
    name: "{{ item.vrf }}"
    rd: "{{ router_id }}:{{ item.l3vni }}"
    state: present
  loop: "{{ leaf_active_domains }}"
  when: "'leaves' in group_names"
  tags: [evpn, vrf]

- name: EVPN | Enable IP routing in each VRF
  arista.eos.eos_config:
    lines: "ip routing vrf {{ item.vrf }}"
    match: line
  loop: "{{ leaf_active_domains }}"
  when: "'leaves' in group_names"
  tags: [evpn, vrf]

# =============================================================================
# 4. VLANs
# =============================================================================
- name: EVPN | Create VLANs
  arista.eos.eos_vlans:
    config:
      - vlan_id: "{{ item.id }}"
        name: "{{ item.name }}"
        state: active
    state: merged
  loop: "{{ leaf_active_l2vnis }}"
  when: "'leaves' in group_names"
  tags: [evpn, vlan]

# =============================================================================
# 5. SVIs - Symmetric IRB (Anycast Gateway)
# =============================================================================
- name: EVPN | Configure Anycast IRB SVIs
  arista.eos.eos_config:
    lines:
      - "description {{ item.name }} [{{ item.vrf }}]"
      - "vrf {{ item.vrf }}"
      - "ip address virtual {{ item.gateway }}/{{ item.prefix | ansible.utils.ipaddr('prefix') }}"
      - "no autostate"
    parents: "interface Vlan{{ item.id }}"
    match: line
  loop: "{{ leaf_active_l2vnis }}"
  when:
    - "'leaves' in group_names"
    - item.gateway is defined and item.gateway != ""
  tags: [evpn, svi, irb]

# =============================================================================
# 6. VXLAN Interface (Vxlan1)
# =============================================================================
- name: EVPN | Configure Vxlan1 base
  arista.eos.eos_config:
    lines:
      - "description VTEP - {{ inventory_hostname }}"
      - "vxlan source-interface {{ vtep_loopback }}"
      - "vxlan udp-port {{ vxlan_udp_port }}"
    parents: "interface Vxlan1"
    match: line
  when: "'leaves' in group_names"
  tags: [evpn, vxlan]

- name: EVPN | Map L2 VNIs to VLANs on Vxlan1
  arista.eos.eos_config:
    lines: "vxlan vlan {{ item.id }} vni {{ item.vni }}"
    parents: "interface Vxlan1"
    match: line
  loop: "{{ leaf_active_l2vnis }}"
  when: "'leaves' in group_names"
  tags: [evpn, vxlan, l2vni]

- name: EVPN | Map L3 VNIs to VRFs on Vxlan1
  arista.eos.eos_config:
    lines: "vxlan vrf {{ item.vrf }} vni {{ item.l3vni }}"
    parents: "interface Vxlan1"
    match: line
  loop: "{{ leaf_active_domains }}"
  when: "'leaves' in group_names"
  tags: [evpn, vxlan, l3vni]

# =============================================================================
# 7. BGP EVPN Configuration — Spine Side
# =============================================================================
- name: EVPN | Spine — EVPN Address-Family Global Settings
  arista.eos.eos_config:
    lines:
      - "neighbor {{ spine_evpn_peer_group }} activate"
      - "neighbor {{ spine_evpn_peer_group }} next-hop-unchanged"
      - "neighbor {{ spine_evpn_peer_group }} send-community extended"
    parents:
      - "router bgp {{ bgp_as }}"
      - "address-family evpn"
    match: line
  when: "'spines' in group_names"
  tags: [evpn, bgp, spine]

- name: EVPN | Spine — Add all Leaves as EVPN neighbors
  arista.eos.eos_config:
    lines:
      - "neighbor {{ hostvars[item]['router_id'] }} peer group {{ spine_evpn_peer_group }}"
      - "neighbor {{ hostvars[item]['router_id'] }} remote-as {{ hostvars[item]['bgp_as'] }}"
      - "neighbor {{ hostvars[item]['router_id'] }} description EVPN-{{ item }}"
      - "neighbor {{ hostvars[item]['router_id'] }} update-source {{ vtep_loopback }}"
      - "neighbor {{ hostvars[item]['router_id'] }} ebgp-multihop 3"
      - "neighbor {{ hostvars[item]['router_id'] }} maximum-routes {{ spine_max_evpn_routes }}"
    parents: "router bgp {{ bgp_as }}"
    match: line
  loop: "{{ groups['leaves'] | default([]) }}"
  when: "'spines' in group_names"
  tags: [evpn, bgp, spine]

# =============================================================================
# 8. BGP EVPN Configuration — Leaf Side
# =============================================================================
- name: EVPN | Leaf — Define SPINE-EVPN Peer-Group
  arista.eos.eos_config:
    lines:
      - "neighbor {{ leaf_evpn_peer_group }} peer group"
      - "neighbor {{ leaf_evpn_peer_group }} send-community extended"
      - "neighbor {{ leaf_evpn_peer_group }} ebgp-multihop 3"
      - "neighbor {{ leaf_evpn_peer_group }} update-source {{ vtep_loopback }}"
    parents: "router bgp {{ bgp_as }}"
    match: line
  when: "'leaves' in group_names"
  tags: [evpn, bgp, leaf]

- name: EVPN | Leaf — Add Spines to SPINE-EVPN Peer-Group
  arista.eos.eos_config:
    lines:
      - "neighbor {{ hostvars[item]['router_id'] }} peer group {{ leaf_evpn_peer_group }}"
      - "neighbor {{ hostvars[item]['router_id'] }} remote-as {{ hostvars[item]['bgp_as'] }}"
      - "neighbor {{ hostvars[item]['router_id'] }} description EVPN-{{ item }}"
    parents: "router bgp {{ bgp_as }}"
    match: line
  loop: "{{ groups['spines'] | default([]) }}"
  when: "'leaves' in group_names"
  tags: [evpn, bgp, leaf]

- name: EVPN | Leaf — Activate EVPN Address-Family toward Spines
  arista.eos.eos_config:
    lines:
      - "neighbor {{ leaf_evpn_peer_group }} activate"
      - "neighbor {{ leaf_evpn_peer_group }} send-community extended"
      - "neighbor {{ leaf_evpn_peer_group }} maximum-routes {{ leaf_max_evpn_routes }}"
    parents:
      - "router bgp {{ bgp_as }}"
      - "address-family evpn"
    match: line
  when: "'leaves' in group_names"
  tags: [evpn, bgp, leaf]

# =============================================================================
# 9. Per-VRF BGP Configuration (L3VNI + Type-5)
# =============================================================================
- name: EVPN | Leaf — Per-VRF BGP settings (RD + Route-Targets)
  arista.eos.eos_config:
    lines:
      - "rd {{ router_id }}:{{ item.l3vni }}"
      - "route-target import evpn {{ item.rt_import | first }}"
      - "route-target export evpn {{ item.rt_export | first }}"
    parents:
      - "router bgp {{ bgp_as }}"
      - "vrf {{ item.vrf }}"
    match: line
  loop: "{{ leaf_active_domains }}"
  when: "'leaves' in group_names"
  tags: [evpn, bgp, l3vni]

- name: EVPN | Leaf — Redistribute connected routes into each VRF (Type-5)
  arista.eos.eos_config:
    lines: "redistribute connected"
    parents:
      - "router bgp {{ bgp_as }}"
      - "vrf {{ item.vrf }}"
      - "address-family ipv4"
    match: line
  loop: "{{ leaf_active_domains }}"
  when: "'leaves' in group_names"
  tags: [evpn, bgp, vrf]

# =============================================================================
# 10. MAC-VRF per L2VNI (Type-2 / Type-3)
# =============================================================================
- name: EVPN | Leaf — MAC-VRF per L2VNI (Type-2/3)
  arista.eos.eos_config:
    lines:
      - "rd {{ router_id }}:{{ item.vni }}"
      - "route-target import evpn {{ item.rt }}"
      - "route-target export evpn {{ item.rt }}"
      - "redistribute learned"
    parents:
      - "router bgp {{ bgp_as }}"
      - "vlan {{ item.id }}"
    match: line
  loop: "{{ leaf_active_l2vnis }}"
  when: "'leaves' in group_names"
  tags: [evpn, bgp, l2vni]

# =============================================================================
# 11. VRF-PUBLIC Special Handling (RFC1918 Isolation)
# =============================================================================
- name: EVPN | Leaf — Apply RFC1918 import filter on VRF-PUBLIC
  arista.eos.eos_config:
    lines: "route-target import evpn route-map RM-PUBLIC-NO-RFC1918"
    parents:
      - "router bgp {{ bgp_as }}"
      - "vrf VRF-PUBLIC"
    match: line
  when:
    - "'leaves' in group_names"
    - "'VRF-PUBLIC' in leaf_active_vrfs"
    - public_domain_no_rfc1918 | default(true) | bool
  tags: [evpn, bgp, dmz, policy]
  
# =============================================================================
# Final Save + Verification
# =============================================================================
- name: EVPN | Save configuration
  arista.eos.eos_config:
    save_when: changed
  tags: [evpn, save]

- name: EVPN | Verification (run with --tags evpn,verify)
  arista.eos.eos_command:
    commands:
      - show bgp evpn summary
      - show vxlan vni
      - show interface Vxlan1
  register: evpn_status
  changed_when: false
  when: "'leaves' in group_names"
  tags: [evpn, verify, never]