# =============================================================================
# Role: arista-underlay
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Routing model
# -----------------------------------------------------------------------------
- name: "UNDERLAY | Enable multi-agent routing model"
  arista.eos.eos_config:
    lines:
      - "service routing protocols model multi-agent"
    match: line
  tags: [underlay, routing_model]

- name: "UNDERLAY | Enable default VRF IP routing"
  arista.eos.eos_config:
    lines:
      - "ip routing"
    match: line
  tags: [underlay, routing_model]

# -----------------------------------------------------------------------------
# 2. Loopback0
# -----------------------------------------------------------------------------
- name: "UNDERLAY | Configure Loopback0"
  arista.eos.eos_config:
    lines:
      - "description {{ loopback0_description | default('Router-ID / VTEP') }}"
      - "ip address {{ loopback0 }}"
      - "no shutdown"
    parents: "interface Loopback0"
    match: line
  when: loopback0 is defined
  tags: [underlay, loopback]

- name: "UNDERLAY | Decide whether to derive spine p2p_links"
  ansible.builtin.set_fact:
    underlay_derive_spine_p2p_links: >-
      {{
        'spines' in group_names
        and spine_p2p_peers is defined
        and (p2p_links | default([]) | length == 0)
      }}
  when:
    - "'spines' in group_names"
    - spine_p2p_peers is defined

- name: "UNDERLAY | Initialize derived spine p2p_links"
  ansible.builtin.set_fact:
    p2p_links: []
  when: underlay_derive_spine_p2p_links | default(false) | bool

- name: "UNDERLAY | Normalize spine p2p_links from spine_p2p_peers"
  ansible.builtin.set_fact:
    p2p_links: >-
      {{
        (p2p_links | default([]))
        + [
          {
            'interface': item.interface,
            'description': item.description | default('FABRIC | P2P underlay'),
            'ip': item.spine_ip,
            'mtu': item.mtu | default(mtu_fabric | default(9214))
          }
        ]
      }}
  loop: "{{ spine_p2p_peers | default([]) }}"
  loop_control:
    label: "{{ item.interface }}"
  when: underlay_derive_spine_p2p_links | default(false) | bool

- name: "UNDERLAY | Normalize leaf p2p_links from spine*_p2p vars"
  ansible.builtin.set_fact:
    p2p_links:
      - interface: "{{ spine01_interface | default('Ethernet1') }}"
        ip: "{{ spine01_leaf_ip }}/31"
        description: "FABRIC | P2P → spine-01"
        mtu: 9214
        remote_ip: "{{ spine01_ip }}"
        remote_asn: "{{ spine_asn }}"
      - interface: "{{ spine02_interface | default('Ethernet2') }}"
        ip: "{{ spine02_leaf_ip }}/31"
        description: "FABRIC | P2P → spine-02"
        mtu: 9214
        remote_ip: "{{ spine02_ip }}"
        remote_asn: "{{ spine_asn }}"
  when:
    - "'leaves' in group_names"
    - spine01_leaf_ip is defined
    - spine02_leaf_ip is defined
    - p2p_links | default([]) | length == 0

- name: "UNDERLAY | Decide whether to derive leaf p2p_links from interfaces"
  ansible.builtin.set_fact:
    underlay_derive_leaf_p2p_from_interfaces: >-
      {{
        'leaves' in group_names
        and interfaces is defined
        and (p2p_links | default([]) | length == 0)
      }}
  when:
    - "'leaves' in group_names"
    - interfaces is defined

- name: "UNDERLAY | Initialize interface-derived leaf p2p_links"
  ansible.builtin.set_fact:
    p2p_links: []
  when: underlay_derive_leaf_p2p_from_interfaces | default(false) | bool

- name: "UNDERLAY | Normalize leaf p2p_links from interface map"
  ansible.builtin.set_fact:
    p2p_links: >-
      {{
        (p2p_links | default([]))
        + [
          {
            'interface': item.key,
            'description': item.value.description | default('FABRIC | P2P underlay'),
            'ip': item.value.ip,
            'mtu': mtu_fabric | default(9214)
          }
        ]
      }}
  loop: "{{ interfaces | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - underlay_derive_leaf_p2p_from_interfaces | default(false) | bool
    - item.value.ip is defined
    - item.value.type | default('') == 'routed'
    - "'P2P' in (item.value.description | default(''))"

# -----------------------------------------------------------------------------
# 3. P2P interfaces (without BFD)
# -----------------------------------------------------------------------------
- name: "UNDERLAY | Configure P2P underlay interfaces"
  arista.eos.eos_config:
    lines:
      - "description {{ item.description | default('P2P underlay') }}"
      - "no switchport"
      - "mtu {{ item.mtu | default(underlay_mtu | default(9000)) }}"
      - "ip address {{ item.ip }}"
      - "no shutdown"
    parents: "interface {{ item.interface }}"
    match: line
  loop: "{{ p2p_links | default([]) }}"
  loop_control:
    label: "{{ item.interface }}"
  when:
    - p2p_links is defined
    - p2p_links | length > 0
    - not (bfd_enabled | default(true) | bool)
  tags: [underlay, interfaces]

# -----------------------------------------------------------------------------
# 4. P2P interfaces (with BFD timers)
# -----------------------------------------------------------------------------
- name: "UNDERLAY | Configure P2P underlay interfaces with BFD"
  arista.eos.eos_config:
    lines:
      - "description {{ item.description | default('P2P underlay') }}"
      - "no switchport"
      - "mtu {{ item.mtu | default(underlay_mtu | default(9000)) }}"
      - "ip address {{ item.ip }}"
      - "bfd interval {{ underlay_bfd_interval | default(100) }} min-rx {{ underlay_bfd_min_rx | default(100) }} multiplier {{ underlay_bfd_multiplier | default(3) }}"
      - "no shutdown"
    parents: "interface {{ item.interface }}"
    match: line
  loop: "{{ p2p_links | default([]) }}"
  loop_control:
    label: "{{ item.interface }}"
  when:
    - p2p_links is defined
    - p2p_links | length > 0
    - bfd_enabled | default(true) | bool
  tags: [underlay, interfaces]

# -----------------------------------------------------------------------------
# 5. Prefix-list
# -----------------------------------------------------------------------------
- name: "UNDERLAY | Configure loopback prefix-list"
  arista.eos.eos_config:
    lines:
      - "seq 10 permit 10.0.0.0/16 le 32"
    parents: "ip prefix-list {{ underlay_prefix_list_name | default('LOOPBACKS') }}"
    match: line
  tags: [underlay, prefix_list]

# -----------------------------------------------------------------------------
# 6. Route-maps
# -----------------------------------------------------------------------------
- name: "UNDERLAY | Route-map OUT"
  arista.eos.eos_config:
    lines:
      - "match ip address prefix-list {{ underlay_prefix_list_name | default('LOOPBACKS') }}"
    parents:
      - "route-map {{ underlay_route_map_out_name | default('RM-OUT') }} permit 10"
    match: line
  tags: [underlay, route_map]

- name: "UNDERLAY | Route-map IN"
  arista.eos.eos_config:
    lines:
      - "description Accept all underlay prefixes"
    parents:
      - "route-map {{ underlay_route_map_in_name | default('RM-IN') }} permit 10"
    match: line
  tags: [underlay, route_map]

# -----------------------------------------------------------------------------
# 7. BGP — create process first so the parent context exists before
#    any task tries to navigate into it with children.
#    eos_config with match: line + parents silently fails when the
#    parent doesn't yet exist in running-config.
# -----------------------------------------------------------------------------
- name: "UNDERLAY | Create and configure BGP process"
  arista.eos.eos_config:
    lines:
      - "router-id {{ bgp_router_id | default(router_id) | default(loopback0 | ipaddr('address')) }}"
      - "no bgp default ipv4-unicast"
      - "distance bgp 20 200 200"
      - "graceful-restart"
      - "maximum-paths {{ bgp_maximum_paths | default(2) }} ecmp {{ bgp_ecmp_paths | default(2) }}"
      - "bgp log-neighbor-changes"
      - "timers bgp {{ bgp_keepalive | default(3) }} {{ bgp_hold_time | default(9) }}"
    parents:
      - "router bgp {{ bgp_as }}"
    before: "end"
    match: line
  tags: [underlay, bgp]

# =============================================================================
# SPINE
# =============================================================================

- name: "SPINE | peer-filter"
  arista.eos.eos_config:
    lines:
      - "10 match as-range {{ leaf_asn_min }}-{{ leaf_asn_max }} result accept"
    parents: "peer-filter {{ spine_bgp_peer_filter }}"
    before: "end"
    match: line
  when: "'spines' in group_names"
  tags: [underlay, spine]

- name: "SPINE | peer-group"
  arista.eos.eos_config:
    lines:
      - "neighbor {{ spine_bgp_peer_group }} peer group"
      - "neighbor {{ spine_bgp_peer_group }} description Underlay to Leaves"
      - "neighbor {{ spine_bgp_peer_group }} send-community"
      - "neighbor {{ spine_bgp_peer_group }} bfd"
      - "neighbor {{ spine_bgp_peer_group }} route-map {{ underlay_route_map_out_name | default('RM-OUT') }} out"
    parents:
      - "router bgp {{ bgp_as }}"
    before: "end"
    match: line
  when: "'spines' in group_names"
  tags: [underlay, spine]

- name: "SPINE | collect BGP config for legacy listen range"
  arista.eos.eos_command:
    commands:
      - "show running-config section router bgp"
  register: spine_bgp_running_config
  when: "'spines' in group_names"
  tags: [underlay, spine]

- name: "SPINE | remove legacy broad listen range"
  arista.eos.eos_config:
    lines:
      - "no bgp listen range 10.0.0.0/8 peer-group {{ spine_bgp_peer_group }} peer-filter {{ spine_bgp_peer_filter }}"
    parents:
      - "router bgp {{ bgp_as }}"
    before: "end"
    match: none
  when:
    - "'spines' in group_names"
    - spine_bgp_running_config.stdout is defined
    - "'bgp listen range 10.0.0.0/8 peer-group' in spine_bgp_running_config.stdout[0]"
  tags: [underlay, spine]

- name: "SPINE | listen range"
  arista.eos.eos_config:
    lines:
      - "bgp listen range 10.1.0.0/16 peer-group {{ spine_bgp_peer_group }} peer-filter {{ spine_bgp_peer_filter }}"
      - "bgp listen range 10.2.0.0/16 peer-group {{ spine_bgp_peer_group }} peer-filter {{ spine_bgp_peer_filter }}"
    parents:
      - "router bgp {{ bgp_as }}"
    before: "end"
    match: line
  when: "'spines' in group_names"
  tags: [underlay, spine]

- name: "SPINE | activate IPv4 unicast underlay"
  arista.eos.eos_config:
    lines:
      - "neighbor {{ spine_bgp_peer_group }} activate"
      - "redistribute connected route-map {{ underlay_route_map_out_name | default('RM-OUT') }}"
    parents:
      - "router bgp {{ bgp_as }}"
      - "address-family ipv4"
    before: "end"
    match: line
  when: "'spines' in group_names"
  tags: [underlay, spine]

# =============================================================================
# LEAF
# =============================================================================

- name: "LEAF | peer-group"
  arista.eos.eos_config:
    lines:
      - "neighbor {{ leaf_bgp_peer_group }} peer group"
      - "neighbor {{ leaf_bgp_peer_group }} description To Spines"
      - "neighbor {{ leaf_bgp_peer_group }} remote-as {{ spine_asn }}"
      - "neighbor {{ leaf_bgp_peer_group }} bfd"
      - "neighbor {{ leaf_bgp_peer_group }} route-map {{ underlay_route_map_in_name | default('RM-IN') }} in"
      - "neighbor {{ leaf_bgp_peer_group }} route-map {{ underlay_route_map_out_name | default('RM-OUT') }} out"
    parents:
      - "router bgp {{ bgp_as }}"
    before: "end"
    match: line
  when: "'leaves' in group_names"
  tags: [underlay, leaf]

- name: "LEAF | neighbors from explicit p2p remote metadata"
  arista.eos.eos_config:
    lines:
      - "neighbor {{ item.remote_ip }} peer group {{ leaf_bgp_peer_group }}"
    parents:
      - "router bgp {{ bgp_as }}"
    before: "end"
    match: line
  loop: "{{ p2p_links | default([]) }}"
  loop_control:
    label: "{{ item.remote_ip | default(item.interface) }}"
  when:
    - "'leaves' in group_names"
    - p2p_links is defined
    - item.remote_ip is defined
    - (item.remote_asn | default(spine_asn) | int) == (spine_asn | int)
  tags: [underlay, leaf]

- name: "LEAF | neighbors from spine uplink variables"
  arista.eos.eos_config:
    lines:
      - "neighbor {{ item }} peer group {{ leaf_bgp_peer_group }}"
    parents:
      - "router bgp {{ bgp_as }}"
    before: "end"
    match: line
  loop:
    - "{{ spine01_ip | default('') }}"
    - "{{ spine02_ip | default('') }}"
  loop_control:
    label: "{{ item }}"
  when:
    - "'leaves' in group_names"
    - item | length > 0
  tags: [underlay, leaf]

- name: "LEAF | neighbors from bgp_neighbors underlay schema"
  arista.eos.eos_config:
    lines:
      - "neighbor {{ item.peer_ip }} peer group {{ leaf_bgp_peer_group }}"
    parents:
      - "router bgp {{ bgp_as }}"
    before: "end"
    match: line
  loop: "{{ bgp_neighbors | default([]) }}"
  loop_control:
    label: "{{ item.peer_ip | default('undefined') }}"
  when:
    - "'leaves' in group_names"
    - item.peer_ip is defined
    - item.remote_as is defined
    - (item.remote_as | int) == (spine_asn | int)
    - "'ipv4_unicast' in (item.address_family | default([]))"
  tags: [underlay, leaf]

- name: "LEAF | activate IPv4 unicast underlay"
  arista.eos.eos_config:
    lines:
      - "neighbor {{ leaf_bgp_peer_group }} activate"
      - "redistribute connected route-map {{ underlay_route_map_out_name | default('RM-OUT') }}"
    parents:
      - "router bgp {{ bgp_as }}"
      - "address-family ipv4"
    before: "end"
    match: line
  when: "'leaves' in group_names"
  tags: [underlay, leaf]

# -----------------------------------------------------------------------------
# SAVE
# -----------------------------------------------------------------------------
- name: "UNDERLAY | Save config"
  arista.eos.eos_config:
    save_when: changed
  tags: [underlay, save]
