
# =============================================================================
# ESI Data Center — Global Variables (group_vars/all.yml)
# Inherited by every host in the inventory.
# =============================================================================

# -----------------------------------------------------------------------------
# Lab identity
# -----------------------------------------------------------------------------
lab_name: esi-datacenter
domain_name: esi.lab
mgmt_subnet: 172.20.20.0/24

# -----------------------------------------------------------------------------
# NTP (Stratum-1 server in Core Pod — dual-homed on L03/L04)
# -----------------------------------------------------------------------------
ntp_servers:
  - 192.168.20.200   # ntp-server data-plane IP (INFRA VRF)
  - 172.20.20.163    # OOB fallback

# -----------------------------------------------------------------------------
# DNS
# -----------------------------------------------------------------------------
dns_servers:
  - 192.168.20.201   # dns-server in INFRA VRF
  - 1.1.1.1          # fallback (ISP side, only reachable in PUBLIC VRF)

# -----------------------------------------------------------------------------
# Syslog
# -----------------------------------------------------------------------------
syslog_server: 192.168.20.174
syslog_facility: local7
syslog_level: informational

# -----------------------------------------------------------------------------
# SNMP / Zabbix
# -----------------------------------------------------------------------------
snmp_community: esi-ro
snmp_location: "ESI DataCenter Lab"
snmp_contact: "noc@esi.lab"
zabbix_server: 192.168.20.167

# -----------------------------------------------------------------------------
# Management credentials (override with Vault in production)
# -----------------------------------------------------------------------------
mgmt_user: admin
mgmt_password: admin          # ansible_password alias
enable_password: ""           # EOS: no enable password by default

# -----------------------------------------------------------------------------
# Logging / banner
# -----------------------------------------------------------------------------
login_banner: |
  ******************************************************************
  *  ESI Data Center Lab — Authorised access only                  *
  *  All sessions are monitored and recorded                       *
  ******************************************************************