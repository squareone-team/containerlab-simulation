! spine-01 — cEOS startup config

hostname spine-01

! Default user for Ansible / SSH access
username admin privilege 15 role network-admin secret admin

interface Management0
   ip address 172.100.100.11/24

ip routing

interface Loopback0
   ip address 10.0.0.1/32

interface Ethernet1
   description P2P >> leaf-01
   no switchport
   ip address 10.1.1.0/31
   no shutdown

router bgp 65000
   router-id 10.0.0.1
   maximum-paths 4
   neighbor LEAFS peer group
   neighbor LEAFS send-community extended
   neighbor LEAFS maximum-routes 12000
   neighbor 10.1.1.1 peer group LEAFS
   neighbor 10.1.1.1 remote-as 65001
   !
   address-family ipv4
      neighbor LEAFS activate
      network 10.0.0.1/32

management api http-commands
   protocol https
   no shutdown