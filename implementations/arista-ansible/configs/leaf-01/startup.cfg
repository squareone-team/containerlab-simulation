! leaf-01 — cEOS startup config

hostname leaf-01

! Default user for Ansible / SSH access
username admin privilege 15 role network-admin secret admin

interface Management0
   ip address 172.100.100.21/24

ip routing

interface Loopback0
   ip address 10.0.1.1/32

interface Ethernet1
   description P2P >> spine-01
   no switchport
   ip address 10.1.1.1/31
   no shutdown

interface Ethernet3
   description ACCESS >> host-01
   switchport access vlan 10
   no shutdown

interface Vlan10
   ip address 10.10.10.1/24
   no shutdown

router bgp 65001
   router-id 10.0.1.1
   maximum-paths 4
   neighbor 10.1.1.0 remote-as 65000
   neighbor 10.1.1.0 send-community extended
   neighbor 10.1.1.0 maximum-routes 12000
   !
   address-family ipv4
      neighbor 10.1.1.0 activate
      network 10.0.1.1/32
      network 10.10.10.0/24

management api http-commands
   protocol https
   no shutdown