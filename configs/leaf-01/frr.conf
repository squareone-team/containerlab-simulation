frr version 8.4_git
frr defaults traditional
hostname leaf-01
domainname localdomain
log syslog informational
no ipv6 forwarding
!
vrf VRF-PEDAGOGY
 vni 50001
exit-vrf
!
interface eth1
 description P2P to spine-01
 ip address 10.0.0.1/31
exit
!
interface eth2
 description P2P to spine-02
 ip address 10.0.0.17/31
exit
!
interface lo
 ip address 10.1.0.11/32
exit
!
router bgp 65001
 no bgp ebgp-requires-policy
 bgp router-id 10.1.0.11
 bgp log-neighbor-changes
 bgp bestpath as-path multipath-relax
 neighbor 10.0.0.0 remote-as 65000
 neighbor 10.0.0.0 description spine-01
 neighbor 10.0.0.0 bfd
 neighbor 10.0.0.0 timers 3 9
 neighbor 10.0.0.16 remote-as 65000
 neighbor 10.0.0.16 description spine-02
 neighbor 10.0.0.16 bfd
 neighbor 10.0.0.16 timers 3 9
 !
 address-family ipv4 unicast
  network 10.1.0.11/32
  neighbor 10.0.0.0 soft-reconfiguration inbound
  neighbor 10.0.0.16 soft-reconfiguration inbound
  maximum-paths 2
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 10.0.0.0 activate
  neighbor 10.0.0.16 activate
  advertise-all-vni
 exit-address-family
exit
!
router bgp 65001 vrf VRF-PEDAGOGY
 bgp router-id 10.1.0.11
 !
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 10.1.0.11:50001
  route-target import 65000:50001
  route-target export 65000:50001
 exit-address-family
exit
!
